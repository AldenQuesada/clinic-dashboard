# ─── ClinicAI — Nginx Security Headers ────────────────────────────────────────
# Inclua este arquivo no bloco server{} ou location / {} do seu nginx.conf:
#   include /path/to/nginx.security.conf;
#
# Equivalente ao _headers do Netlify/Cloudflare Pages para deploy Nginx.

# Impede que o conteúdo seja renderizado em iframe de outras origens
add_header X-Frame-Options "DENY" always;

# Impede que o browser adivinhe o MIME type
add_header X-Content-Type-Options "nosniff" always;

# Força HTTPS por 1 ano (incluindo subdomínios — remova includeSubDomains se não aplicável)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Política de Referrer: não vaza URL (incluindo #token) para nenhuma origem
add_header Referrer-Policy "no-referrer" always;

# Permissões mínimas: desativa câmera, microfone e geolocalização
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CSP server-level: mais restrito que a meta-tag no HTML
# script-src 'self' — sem unsafe-inline; todos os scripts devem ser externos
add_header Content-Security-Policy "default-src 'self' https://oqboitkpcvuaudouwvkl.supabase.co; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://oqboitkpcvuaudouwvkl.supabase.co https://viacep.com.br; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

# Cache longo para JS (quebra de cache por query string no deploy CI)
location ~* ^/js/.*\.js$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    # Repetir os headers de segurança dentro do bloco location (nginx não herda add_header em blocos aninhados)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self' https://oqboitkpcvuaudouwvkl.supabase.co; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://oqboitkpcvuaudouwvkl.supabase.co https://viacep.com.br; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}

# Sem cache para HTML (sempre busca versão atual)
location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}
