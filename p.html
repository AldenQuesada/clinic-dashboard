<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carregando...</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Page Render — Brandbook Identity System
   Cormorant Garamond + Montserrat | Champagne palette
   Squared edges (2px radius) | Generous spacing
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);font-weight:300;font-size:15px;line-height:1.8;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

:root{
  --champagne:#C8A97E;--champagne-light:#DFC5A0;--champagne-dark:#A8895E;
  --ivory:#F5F0E8;--graphite:#2C2C2C;--graphite-light:#4A4A4A;
  --sage:#8A9E88;--rosa:#C4937A;--bege:#E8DDD0;--white:#FEFCF8;
  --bg:var(--white);--text:var(--graphite);--text2:var(--graphite-light);
  --wa-green:#25D366;--wa-dark:#128C7E;
  --radius:0px;--font-display:'Cormorant Garamond',serif;--font-body:'Montserrat',sans-serif;--section-gap:7rem;--card-pad:2.5rem;
}

.page-container{max-width:100%;overflow-x:hidden}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.loading-spinner{width:24px;height:24px;border:2px solid var(--bege);border-top-color:var(--champagne);border-radius:50%;animation:spin .6s linear infinite}
.loading-text{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--champagne)}
@keyframes spin{to{transform:rotate(360deg)}}
.error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;text-align:center;padding:2rem}
.error-page h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--graphite)}
.error-page p{font-size:13px;color:var(--graphite-light)}

/* ── BLOCK: Hero ──────────────────────────────────────────── */
.blk-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--section-gap) 2rem;text-align:center;position:relative;overflow:hidden}
.blk-hero.dark{background:var(--graphite);color:var(--ivory);position:relative}
.blk-hero.dark::before{content:'';position:absolute;inset:0;background-image:radial-gradient(ellipse at 20% 50%,rgba(200,169,126,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(138,158,136,.08) 0%,transparent 50%);pointer-events:none}
.blk-hero.dark::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(200,169,126,.04) 79px,rgba(200,169,126,.04) 80px);pointer-events:none}
.blk-hero.dark>*{position:relative;z-index:1}
.blk-hero.light{background:var(--ivory);color:var(--graphite)}
.blk-hero-title{font-family:var(--font-display);font-size:clamp(32px,7vw,56px);font-weight:300;font-style:italic;line-height:1.12;margin-bottom:1rem;max-width:700px}
.blk-hero-title .accent{color:var(--champagne)}
.blk-hero-sub{font-size:clamp(14px,3vw,17px);font-weight:300;opacity:.7;max-width:500px;line-height:1.7;margin:0 auto}

/* ── BLOCK: Title ─────────────────────────────────────────── */
.blk-title{padding:var(--section-gap) 3rem 2rem;max-width:1100px;margin:0 auto}
.blk-title h2{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);font-weight:300;line-height:1.15;margin-bottom:.5rem}
.blk-title p{font-size:14px;color:var(--graphite-light);max-width:600px}

/* ── BLOCK: Text ──────────────────────────────────────────── */
.blk-text{padding:1.5rem 3rem;max-width:760px;margin:0 auto;font-size:15px;line-height:1.8;color:var(--graphite-light)}

/* ── BLOCK: Image ─────────────────────────────────────────── */
.blk-image{padding:1rem 2rem;max-width:900px;margin:0 auto}
.blk-image img{width:100%;border-radius:var(--radius);object-fit:cover}

/* ── BLOCK: Video ─────────────────────────────────────────── */
.blk-video{padding:1rem 2rem;max-width:900px;margin:0 auto}
.blk-video .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius)}
.blk-video iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}

/* ── BLOCK: Badges ────────────────────────────────────────── */
.blk-badges{display:flex;gap:2px;justify-content:center;padding:2rem;flex-wrap:wrap;max-width:900px;margin:0 auto}
.blk-badge{display:flex;align-items:center;gap:.75rem;padding:1rem 1.5rem;background:var(--ivory);border-left:2px solid var(--champagne);font-size:13px;font-weight:400}
.blk-badge-icon{font-size:18px}

/* ── BLOCK: Checklist ─────────────────────────────────────── */
.blk-check{padding:2rem;max-width:700px;margin:0 auto}
.blk-check-item{display:flex;align-items:flex-start;gap:.75rem;padding:.6rem 0;font-size:14px;line-height:1.5}
.blk-check-icon{width:20px;height:20px;background:var(--champagne);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.blk-check-icon svg{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none}

/* ── BLOCK: Testimonial ───────────────────────────────────── */
.blk-testimonial{padding:2rem;max-width:700px;margin:0 auto}
.blk-testimonial-card{padding:var(--card-pad);background:var(--ivory);border-left:2px solid var(--champagne)}
.blk-testimonial-stars{color:var(--champagne);font-size:14px;letter-spacing:2px;margin-bottom:.75rem}
.blk-testimonial-body{font-family:var(--font-display);font-size:18px;font-style:italic;font-weight:300;line-height:1.5;color:var(--graphite);margin-bottom:1rem}
.blk-testimonial-author{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--champagne)}
.blk-testimonial-date{font-size:11px;color:var(--graphite-light);margin-top:.25rem}

/* ── BLOCK: Carousel ──────────────────────────────────────── */
.blk-carousel{padding:2rem;max-width:900px;margin:0 auto;position:relative;overflow:hidden}
.blk-carousel-track{display:flex;transition:transform .4s ease}
.blk-carousel-slide{min-width:100%;border-radius:var(--radius);overflow:hidden}
.blk-carousel-slide img{width:100%;object-fit:cover}
.blk-carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:1rem}
.blk-carousel-dot{width:6px;height:6px;background:var(--bege);border-radius:50%;cursor:pointer;transition:all .2s}
.blk-carousel-dot.active{background:var(--champagne);width:18px;border-radius:3px}

/* ── BLOCK: Buttons ───────────────────────────────────────── */
.blk-buttons{display:flex;flex-direction:column;gap:8px;padding:2rem;max-width:500px;margin:0 auto;align-items:center}
.blk-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:1rem 2.5rem;border:none;border-radius:0;font-family:var(--font-body);font-size:14px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.blk-btn-whatsapp{background:var(--wa-green);color:#fff}
.blk-btn-whatsapp:hover{background:var(--wa-dark)}
.blk-btn-champagne{background:var(--champagne);color:#fff}
.blk-btn-champagne:hover{background:var(--champagne-dark)}
.blk-btn-outline{background:transparent;border:1.5px solid var(--champagne);color:var(--champagne)}
.blk-btn-outline:hover{background:var(--champagne);color:#fff}
.blk-btn-graphite{background:var(--graphite);color:var(--ivory)}
.blk-btn-graphite:hover{background:var(--graphite-light)}
.blk-btn svg{width:18px;height:18px;fill:currentColor}

/* ── BLOCK: Price ─────────────────────────────────────────── */
.blk-price{padding:2rem;max-width:500px;margin:0 auto;text-align:center}
.blk-price-card{padding:3rem;background:var(--ivory);border:1px solid var(--bege);border-top:3px solid var(--champagne)}
.blk-price-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--champagne);font-weight:600;margin-bottom:.5rem}
.blk-price-original{font-size:15px;color:var(--graphite-light);text-decoration:line-through}
.blk-price-value{font-family:var(--font-display);font-size:48px;font-weight:300;color:var(--champagne);line-height:1}
.blk-price-parcelas{font-size:14px;color:var(--graphite-light);margin-top:.5rem}
.blk-price-economy{display:inline-block;margin-top:.75rem;padding:.35rem 1rem;background:rgba(138,158,136,.12);font-size:12px;font-weight:500;color:var(--sage)}

/* ── BLOCK: Divider ───────────────────────────────────────── */
.blk-divider{height:1px;background:var(--bege);margin:4rem 3rem;position:relative;max-width:1100px;margin-left:auto;margin-right:auto}
.blk-divider-mark{width:8px;height:8px;background:var(--champagne);transform:rotate(45deg);position:absolute;top:-3.5px;left:50%;margin-left:-4px}

/* ── BLOCK: Spacer ────────────────────────────────────────── */
.blk-spacer{display:block}

/* ── BLOCK: Toggle ────────────────────────────────────────── */
.blk-toggles{padding:2rem;max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:6px}
.blk-toggle{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--ivory);border:1.5px solid var(--bege);cursor:pointer;transition:all .25s;user-select:none}
.blk-toggle.on{border-color:var(--champagne);background:linear-gradient(135deg,rgba(200,169,126,.08),var(--ivory))}
.blk-toggle-dot{width:18px;height:18px;border:2px solid var(--bege);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.blk-toggle.on .blk-toggle-dot{background:var(--champagne);border-color:var(--champagne)}
.blk-toggle.on .blk-toggle-dot::after{content:'';width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.blk-toggle-label{font-size:14px;font-weight:400;color:var(--graphite)}

/* ── BLOCK: Hero with image ────────────────────────────────── */
.blk-hero-img{position:absolute;inset:0;z-index:0}
.blk-hero-img img{width:100%;height:100%;object-fit:cover;object-position:center top}
.blk-hero-gradient{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(44,44,44,0) 0%,rgba(44,44,44,0) 30%,rgba(44,44,44,.25) 50%,rgba(44,44,44,.7) 70%,rgba(44,44,44,.92) 85%,rgba(44,44,44,1) 100%);pointer-events:none}
.blk-hero.has-img{position:relative;overflow:hidden}
.blk-hero.has-img>*:not(.blk-hero-img):not(.blk-hero-gradient){position:relative;z-index:2}
.blk-hero-label{font-family:var(--font-body);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--champagne);font-weight:500;margin-bottom:.5rem}
.blk-hero-tagline{font-family:var(--font-display);font-size:14px;font-style:italic;font-weight:300;color:var(--champagne);opacity:.85;margin-bottom:1rem}
.blk-hero-desc{font-size:12px;color:rgba(245,240,232,.55);max-width:340px;margin:0 auto;line-height:1.7}

/* ── BLOCK: Links ─────────────────────────────────────────── */
.blk-links{padding:2rem 1.5rem;max-width:480px;margin:0 auto;background:var(--white)}
.blk-links-label{font-family:var(--font-body);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--champagne);font-weight:500;text-align:center;margin-bottom:.5rem}
.blk-links-title{font-family:var(--font-display);font-size:24px;font-weight:300;text-align:center;margin-bottom:1.5rem}
.blk-link-btn{display:flex;align-items:center;gap:1rem;width:100%;padding:1rem 1.5rem;margin-bottom:2px;background:var(--ivory);border:1px solid var(--bege);text-decoration:none;color:var(--graphite);transition:all .3s;position:relative;overflow:hidden}
.blk-link-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--champagne);transform:scaleY(0);transition:transform .3s}
.blk-link-btn:hover::before{transform:scaleY(1)}
.blk-link-btn:hover{background:rgba(200,169,126,.08)}
.blk-link-icon{width:20px;height:20px;flex-shrink:0;color:var(--champagne)}
.blk-link-icon svg{width:100%;height:100%}
.blk-link-text{flex:1}
.blk-link-title{font-size:13px;font-weight:500;letter-spacing:.05em;display:block}
.blk-link-sub{font-size:10px;color:var(--graphite-light);letter-spacing:.02em}
.blk-link-arrow{width:14px;height:14px;color:var(--champagne);opacity:.5;flex-shrink:0}
.blk-link-arrow svg{width:100%;height:100%}

/* ── BLOCK: Testimonials carousel ─────────────────────────── */
.blk-testimonials{padding:2.5rem 0 2rem;max-width:480px;margin:0 auto}
.blk-testimonials-track{display:flex;gap:2px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 1.5rem 1rem}
.blk-testimonials-track::-webkit-scrollbar{display:none}
.blk-tcard{min-width:calc(100% - 3rem);scroll-snap-align:center;flex-shrink:0;padding:2rem;background:var(--ivory);border-left:2px solid var(--champagne)}
.blk-tcard-stars{color:var(--champagne);font-size:14px;letter-spacing:2px;margin-bottom:.75rem}
.blk-tcard-quote{font-family:var(--font-display);font-size:16px;font-style:italic;font-weight:300;line-height:1.6;color:var(--graphite);margin-bottom:1rem}
.blk-tcard-author{display:flex;align-items:center;gap:.75rem}
.blk-tcard-avatar{width:32px;height:32px;background:var(--champagne);color:var(--white);font-family:var(--font-display);font-size:16px;font-weight:300;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.blk-tcard-name{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--champagne)}
.blk-tcard-meta{font-size:10px;color:var(--graphite-light)}
.blk-testimonials-dots{display:flex;justify-content:center;gap:6px;margin-top:.75rem}
.blk-testimonials-dot{width:6px;height:6px;background:var(--bege);border:none;cursor:pointer;transition:all .2s;padding:0}
.blk-testimonials-dot.active{background:var(--champagne);width:18px}
.blk-testimonials-hint{font-size:9px;letter-spacing:.15em;text-transform:uppercase;text-align:center;opacity:.4;margin-top:.5rem;color:var(--graphite-light)}

/* ── BLOCK: Before/After carousel ─────────────────────────── */
.blk-ba{padding:2.5rem 0 2rem;background:var(--graphite);max-width:480px;margin:0 auto}
.blk-ba-track{display:flex;gap:2px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 1.5rem 1rem}
.blk-ba-track::-webkit-scrollbar{display:none}
.blk-ba-slide{min-width:calc(100% - 3rem);scroll-snap-align:center;flex-shrink:0}
.blk-ba-card{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(245,240,232,.04);border:1px solid rgba(200,169,126,.15)}
.blk-ba-img{aspect-ratio:3/4;position:relative;overflow:hidden;background:rgba(200,169,126,.06)}
.blk-ba-img img{width:100%;height:100%;object-fit:cover}
.blk-ba-label{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;font-size:8px;letter-spacing:.2em;text-transform:uppercase;text-align:center;background:rgba(44,44,44,.7);color:var(--champagne);font-weight:500}
.blk-ba-info{grid-column:span 2;padding:1rem 1.25rem;background:rgba(245,240,232,.04)}
.blk-ba-procedure{font-family:var(--font-display);font-size:15px;font-weight:300;color:var(--ivory);margin-bottom:.25rem}
.blk-ba-detail{font-size:11px;color:rgba(245,240,232,.45);line-height:1.5}
.blk-ba-dots{display:flex;justify-content:center;gap:6px;margin-top:.75rem}
.blk-ba-dot{width:6px;height:6px;background:rgba(200,169,126,.3);border:none;cursor:pointer;transition:all .2s;padding:0}
.blk-ba-dot.active{background:var(--champagne);width:18px}

/* ── BLOCK: CTA Section ───────────────────────────────────── */
.blk-cta-section{padding:3rem 2rem;background:var(--graphite);text-align:center;position:relative;overflow:hidden;max-width:480px;margin:0 auto}
.blk-cta-section::before{content:'';position:absolute;inset:0;background-image:radial-gradient(ellipse at 20% 50%,rgba(200,169,126,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(138,158,136,.08) 0%,transparent 50%);pointer-events:none}
.blk-cta-section>*{position:relative;z-index:1}
.blk-cta-headline{font-family:var(--font-display);font-size:22px;font-style:italic;font-weight:300;color:var(--ivory);line-height:1.4;max-width:340px;margin:0 auto 1rem}
.blk-cta-sub{font-size:12px;color:rgba(245,240,232,.5);margin-bottom:1.5rem}

/* ── BLOCK: Footer ────────────────────────────────────────── */
.blk-footer{padding:2rem 1.5rem;background:var(--graphite);text-align:center;border-top:1px solid rgba(200,169,126,.1);max-width:480px;margin:0 auto}
.blk-footer-logo{font-family:var(--font-display);font-size:18px;font-weight:300;color:var(--ivory);margin-bottom:.25rem}
.blk-footer-logo-label{display:block;font-family:var(--font-body);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--champagne);margin-bottom:2px}
.blk-footer-tagline{font-family:var(--font-display);font-size:11px;font-style:italic;color:rgba(200,169,126,.5);margin-bottom:1rem}
.blk-footer-social{display:flex;justify-content:center;gap:1.25rem;margin-bottom:1rem}
.blk-footer-social a{width:32px;height:32px;border:1px solid rgba(200,169,126,.2);display:flex;align-items:center;justify-content:center;color:var(--champagne);text-decoration:none;transition:all .3s}
.blk-footer-social a:hover{background:rgba(200,169,126,.1);border-color:var(--champagne)}
.blk-footer-social svg{width:14px;height:14px}
.blk-footer-copy{font-size:9px;color:rgba(245,240,232,.25);letter-spacing:.1em}

/* ── Mobile wrapper ───────────────────────────────────────── */
.page-mobile{max-width:480px;margin:0 auto;background:var(--white);min-height:100vh;position:relative;overflow:hidden}

/* ── Sticky button ────────────────────────────────────────── */
.sticky-btn{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:rgba(254,252,248,.96);backdrop-filter:blur(8px);border-top:1px solid var(--bege);z-index:100;display:flex;justify-content:center}
.sticky-btn .blk-btn{max-width:400px}

/* ── Dark variant ─────────────────────────────────────────── */
.page-dark{--bg:var(--graphite);--text:var(--ivory);--text2:rgba(245,240,232,.6)}
.page-dark .blk-badge{background:rgba(245,240,232,.04);border-left-color:var(--champagne)}
.page-dark .blk-testimonial-card{background:rgba(245,240,232,.04);color:var(--ivory)}
.page-dark .blk-testimonial-body{color:var(--ivory)}
.page-dark .blk-price-card{background:rgba(245,240,232,.04);border-color:rgba(200,169,126,.2)}
.page-dark .blk-toggle{background:rgba(245,240,232,.04);border-color:rgba(200,169,126,.15)}
.page-dark .blk-toggle.on{background:rgba(200,169,126,.1)}
.page-dark .blk-check-item{color:var(--ivory)}
.page-dark .sticky-btn{background:rgba(44,44,44,.96);border-top-color:rgba(200,169,126,.15)}

/* ── Responsive ───────────────────────────────────────────── */
@media(max-width:640px){
  :root{--section-gap:4rem;--card-pad:1.5rem}
  .blk-hero{padding:3rem 1.5rem}
  .blk-badges{flex-direction:column;padding:1.5rem}
}
</style>
</head>
<body>

<div id="pageRoot">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando</div>
  </div>
</div>

<script>

  var SB='https://oqboitkpcvuaudouwvkl.supabase.co'
  var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xYm9pdGtwY3Z1YXVkb3V3dmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTgyMzQsImV4cCI6MjA5MDAzNDIzNH0.8d1HT8GTxIVsaTtl9eOiijDkWUVDLaTv2W4qahmI8w0'
  var WA_SVG='<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.612.616l4.573-1.46A11.956 11.956 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.319 0-4.476-.714-6.262-1.932a.5.5 0 00-.404-.067l-3.093.988.956-3.032a.5.5 0 00-.064-.415A9.946 9.946 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>'
  var CHECK_SVG='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'

  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

  var slug=new URLSearchParams(window.location.search).get('s')
  if(!slug){showError();return}

  fetch(SB+'/rest/v1/rpc/page_resolve',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify({p_slug:slug})})
  .then(function(r){return r.json()})
  .then(function(data){
    if(!data||!data.ok){showError();return}
    document.title=data.title||'Pagina'
    renderPage(data.schema)
  })
  .catch(showError)

  function showError(){
    document.getElementById('pageRoot').innerHTML='<div class="error-page"><h2>P\u00e1gina n\u00e3o encontrada</h2><p>O link pode ter expirado ou estar incorreto.</p><a href="/" style="color:var(--champagne);font-size:13px;margin-top:1rem">Voltar ao in\u00edcio</a></div>'
  }

  function renderPage(schema){
    var blocks=schema.blocks||[]
    var app=schema.appearance||{}
    var sticky=schema.sticky_button

    var root=document.getElementById('pageRoot')
    var isDark=app.theme==='dark'
    var isMobile=app.layout==='mobile'
    var container=document.createElement('div')
    container.className=(isMobile?'page-mobile':'page-container')+(isDark?' page-dark':'')

    blocks.forEach(function(b){
      var el=renderBlock(b)
      if(el)container.appendChild(el)
    })

    // Sticky button
    if(sticky&&sticky.enabled){
      var sDiv=document.createElement('div')
      sDiv.className='sticky-btn'
      sDiv.innerHTML=renderButton(sticky)
      container.appendChild(sDiv)
      // Add bottom padding so content isn't hidden behind sticky
      var spacer=document.createElement('div')
      spacer.style.height='80px'
      container.appendChild(spacer)
    }

    root.innerHTML=''
    root.appendChild(container)

    // Init all interactive elements
    initCarousels()
    initScrollCarousels()
    initToggles()
  }

  function renderBlock(b){
    var div=document.createElement('div')
    switch(b.type){
      case 'hero':
        div.className='blk-hero '+(b.theme||'dark')+(b.image_url?' has-img':'')
        if(b.bg_color&&!b.image_url)div.style.background=b.bg_color
        if(b.image_url)div.innerHTML='<div class="blk-hero-img"><img src="'+esc(b.image_url)+'" alt=""></div><div class="blk-hero-gradient"></div>'
        div.innerHTML+=(b.label?'<p class="blk-hero-label">'+esc(b.label)+'</p>':'')
          +'<h1 class="blk-hero-title">'+esc(b.title||'').replace(/\{accent\}(.*?)\{\/accent\}/g,'<span class="accent">$1</span>')+'</h1>'
          +(b.tagline?'<p class="blk-hero-tagline">'+esc(b.tagline)+'</p>':'')
          +(b.subtitle?'<p class="blk-hero-sub">'+esc(b.subtitle)+'</p>':'')
          +(b.description?'<p class="blk-hero-desc">'+esc(b.description)+'</p>':'')
        return div
      case 'title':
        div.className='blk-title'
        div.style.textAlign=b.align||'left'
        div.innerHTML='<h2>'+esc(b.text||'')+'</h2>'+(b.subtitle?'<p>'+esc(b.subtitle)+'</p>':'')
        return div
      case 'text':
        div.className='blk-text'
        div.style.textAlign=b.align||'left'
        div.innerHTML=esc(b.content||'').replace(/\n/g,'<br>')
        return div
      case 'image':
        div.className='blk-image'
        var img='<img src="'+esc(b.url||'')+'" alt="'+esc(b.alt||'')+'"'
        if(b.height)img+=' style="height:'+b.height+'px;object-fit:cover"'
        img+='>'
        div.innerHTML=img
        return div
      case 'video':
        div.className='blk-video'
        var src=b.url||''
        if(src.includes('youtube'))src=src.replace('watch?v=','embed/')
        if(src.includes('vimeo.com/')&&!src.includes('player'))src=src.replace('vimeo.com/','player.vimeo.com/video/')
        div.innerHTML='<div class="video-wrap"><iframe src="'+esc(src)+'" allowfullscreen></iframe></div>'
        return div
      case 'badges':
        div.className='blk-badges'
        ;(b.items||[]).forEach(function(badge){
          div.innerHTML+='<div class="blk-badge"><span class="blk-badge-icon">'+esc(badge.icon||'')+'</span><span>'+esc(badge.text||'')+'</span></div>'
        })
        return div
      case 'check':
        div.className='blk-check'
        ;(b.items||[]).forEach(function(item){
          div.innerHTML+='<div class="blk-check-item"><div class="blk-check-icon">'+CHECK_SVG+'</div><span>'+esc(item)+'</span></div>'
        })
        return div
      case 'testimonial':
        div.className='blk-testimonial'
        var stars='';for(var i=0;i<(b.stars||5);i++)stars+='\u2605'
        div.innerHTML='<div class="blk-testimonial-card">'
          +'<div class="blk-testimonial-stars">'+stars+'</div>'
          +'<div class="blk-testimonial-body">'+esc(b.body||'')+'</div>'
          +'<div class="blk-testimonial-author">'+esc(b.author||'')+'</div>'
          +(b.date?'<div class="blk-testimonial-date">'+esc(b.date)+'</div>':'')
          +'</div>'
        return div
      case 'carousel':
        div.className='blk-carousel'
        div.dataset.carousel='true'
        var track='<div class="blk-carousel-track">'
        var dots='<div class="blk-carousel-dots">'
        ;(b.slides||[]).forEach(function(s,i){
          track+='<div class="blk-carousel-slide"><img src="'+esc(s.url||s.image||'')+'" alt=""></div>'
          dots+='<div class="blk-carousel-dot'+(i===0?' active':'')+'" data-idx="'+i+'"></div>'
        })
        track+='</div>';dots+='</div>'
        div.innerHTML=track+dots
        return div
      case 'buttons':
        div.className='blk-buttons'
        ;(b.items||[]).forEach(function(btn){
          div.innerHTML+=renderButton(btn)
        })
        return div
      case 'price':
        div.className='blk-price'
        var econ=b.original&&b.value&&b.original>b.value?(b.original-b.value):0
        div.innerHTML='<div class="blk-price-card">'
          +(b.label?'<div class="blk-price-label">'+esc(b.label)+'</div>':'')
          +(b.original?'<div class="blk-price-original">De R$ '+Number(b.original).toLocaleString('pt-BR')+'</div>':'')
          +'<div class="blk-price-value">R$ '+Number(b.value||0).toLocaleString('pt-BR')+'</div>'
          +(b.parcelas?'<div class="blk-price-parcelas">'+b.parcelas+'x de R$ '+Math.ceil(b.value/b.parcelas).toLocaleString('pt-BR')+' sem juros</div>':'')
          +(econ>0?'<div class="blk-price-economy">Economia de R$ '+econ.toLocaleString('pt-BR')+'</div>':'')
          +'</div>'
        return div
      case 'divider':
        div.className='blk-divider'
        div.innerHTML='<div class="blk-divider-mark"></div>'
        return div
      case 'spacer':
        div.className='blk-spacer'
        div.style.height=(b.height||60)+'px'
        return div
      case 'toggles':
        div.className='blk-toggles'
        ;(b.items||[]).forEach(function(t,i){
          div.innerHTML+='<div class="blk-toggle'+(t.default_on?' on':'')+'" data-toggle-idx="'+i+'">'
            +'<div class="blk-toggle-dot"></div>'
            +'<span class="blk-toggle-label">'+esc(t.label||'')+'</span>'
            +'</div>'
        })
        return div
      case 'links':
        div.className='blk-links'
        var arrowSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>'
        if(b.label)div.innerHTML+='<div class="blk-links-label">'+esc(b.label)+'</div>'
        if(b.title)div.innerHTML+='<div class="blk-links-title">'+esc(b.title)+'</div>'
        ;(b.items||[]).forEach(function(lnk){
          div.innerHTML+='<a class="blk-link-btn" href="'+esc(lnk.url||'#')+'" target="_blank">'
            +'<div class="blk-link-icon">'+(lnk.icon_svg||'')+'</div>'
            +'<div class="blk-link-text"><span class="blk-link-title">'+esc(lnk.title||'')+'</span>'
            +(lnk.subtitle?'<span class="blk-link-sub">'+esc(lnk.subtitle)+'</span>':'')+'</div>'
            +'<div class="blk-link-arrow">'+arrowSvg+'</div></a>'
        })
        return div
      case 'testimonials':
        div.className='blk-testimonials'
        if(b.label)div.innerHTML+='<div class="blk-links-label" style="padding:0 1.5rem">'+esc(b.label)+'</div>'
        if(b.title)div.innerHTML+='<div class="blk-links-title" style="padding:0 1.5rem">'+esc(b.title)+'</div>'
        var tTrack='<div class="blk-testimonials-track" data-tcarousel="true">'
        var tDots='<div class="blk-testimonials-dots">'
        ;(b.items||[]).forEach(function(t,i){
          var stars='';for(var s=0;s<(t.stars||5);s++)stars+='\u2605'
          tTrack+='<div class="blk-tcard">'
            +'<div class="blk-tcard-stars">'+stars+'</div>'
            +'<p class="blk-tcard-quote">\u201c'+esc(t.body||'')+'\u201d</p>'
            +'<div class="blk-tcard-author"><div class="blk-tcard-avatar">'+(esc(t.author||'?')[0])+'</div>'
            +'<div><span class="blk-tcard-name">'+esc(t.author||'')+'</span>'
            +(t.meta?'<span class="blk-tcard-meta">'+esc(t.meta)+'</span>':'')+'</div></div></div>'
          tDots+='<button class="blk-testimonials-dot'+(i===0?' active':'')+'" data-tidx="'+i+'"></button>'
        })
        tTrack+='</div>';tDots+='</div>'
        div.innerHTML+=tTrack+tDots+'<p class="blk-testimonials-hint">Deslize para ver mais</p>'
        return div
      case 'before_after':
        div.className='blk-ba'
        if(b.label)div.innerHTML+='<div class="blk-links-label" style="color:var(--champagne);padding:0 1.5rem">'+esc(b.label)+'</div>'
        if(b.title)div.innerHTML+='<div class="blk-links-title section-title--light" style="color:var(--ivory);padding:0 1.5rem">'+esc(b.title)+'</div>'
        var baTrack='<div class="blk-ba-track" data-bacarousel="true">'
        var baDots='<div class="blk-ba-dots">'
        ;(b.slides||[]).forEach(function(s,i){
          baTrack+='<div class="blk-ba-slide"><div class="blk-ba-card">'
            +'<div class="blk-ba-img">'+(s.before_url?'<img src="'+esc(s.before_url)+'" alt="Antes">':'<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;color:rgba(200,169,126,.4);text-transform:uppercase;letter-spacing:.1em">Foto antes</div>')+'<div class="blk-ba-label">Antes</div></div>'
            +'<div class="blk-ba-img">'+(s.after_url?'<img src="'+esc(s.after_url)+'" alt="Depois">':'<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;color:rgba(200,169,126,.4);text-transform:uppercase;letter-spacing:.1em">Foto depois</div>')+'<div class="blk-ba-label">Depois</div></div>'
            +'<div class="blk-ba-info"><p class="blk-ba-procedure">'+esc(s.procedure||'')+'</p><p class="blk-ba-detail">'+esc(s.detail||'')+'</p></div>'
            +'</div></div>'
          baDots+='<button class="blk-ba-dot'+(i===0?' active':'')+'" data-baidx="'+i+'"></button>'
        })
        baTrack+='</div>';baDots+='</div>'
        div.innerHTML+=baTrack+baDots
        return div
      case 'cta_section':
        div.className='blk-cta-section'
        if(b.label)div.innerHTML+='<div class="blk-links-label" style="color:var(--champagne);margin-bottom:1rem">'+esc(b.label)+'</div>'
        if(b.headline)div.innerHTML+='<p class="blk-cta-headline">\u201c'+esc(b.headline)+'\u201d</p>'
        if(b.subtitle)div.innerHTML+='<p class="blk-cta-sub">'+esc(b.subtitle)+'</p>'
        if(b.button_label)div.innerHTML+=renderButton({label:b.button_label,url:b.button_url||'#',style:b.button_style||'champagne'})
        return div
      case 'footer':
        div.className='blk-footer'
        div.innerHTML='<div class="blk-footer-logo"><span class="blk-footer-logo-label">'+esc(b.clinic_label||'Cl\u00ednica')+'</span>'+esc(b.clinic_name||'Mirian de Paula')+'</div>'
          +(b.tagline?'<p class="blk-footer-tagline">'+esc(b.tagline)+'</p>':'')
        if(b.social&&b.social.length){
          var sHtml='<div class="blk-footer-social">'
          b.social.forEach(function(s){sHtml+='<a href="'+esc(s.url||'#')+'" target="_blank" aria-label="'+esc(s.label||'')+'">'+( s.icon_svg||'')+'</a>'})
          sHtml+='</div>';div.innerHTML+=sHtml
        }
        div.innerHTML+='<p class="blk-footer-copy">\u00a9 2026 '+esc(b.clinic_label||'Cl\u00ednica')+' '+esc(b.clinic_name||'Mirian de Paula')+'</p>'
        return div
      default:return null
    }
  }

  function renderButton(btn){
    var style=btn.style||'champagne'
    var isWa=style==='whatsapp'
    var icon=isWa?WA_SVG:''
    return '<a class="blk-btn blk-btn-'+esc(style)+'" href="'+esc(btn.url||'#')+'" target="_blank">'+icon+esc(btn.label||'')+'</a>'
  }

  function initCarousels(){
    document.querySelectorAll('[data-carousel]').forEach(function(c){
      var track=c.querySelector('.blk-carousel-track')
      var dots=c.querySelectorAll('.blk-carousel-dot')
      var idx=0,total=dots.length
      if(total<=1)return
      dots.forEach(function(d){
        d.addEventListener('click',function(){
          idx=parseInt(d.dataset.idx)
          track.style.transform='translateX(-'+idx*100+'%)'
          dots.forEach(function(dd){dd.classList.remove('active')})
          d.classList.add('active')
        })
      })
      // Auto-advance
      setInterval(function(){
        idx=(idx+1)%total
        track.style.transform='translateX(-'+idx*100+'%)'
        dots.forEach(function(dd){dd.classList.remove('active')})
        dots[idx].classList.add('active')
      },4000)
    })
  }

  function initScrollCarousels(){
    // Testimonials scroll carousel
    document.querySelectorAll('[data-tcarousel]').forEach(function(track){
      var dots=track.parentElement.querySelectorAll('.blk-testimonials-dot')
      track.addEventListener('scroll',function(){
        var sw=track.children[0]?.offsetWidth||1
        var idx=Math.round(track.scrollLeft/sw)
        dots.forEach(function(d,i){d.classList.toggle('active',i===idx)})
      })
      dots.forEach(function(d){d.addEventListener('click',function(){
        var idx=parseInt(d.dataset.tidx);var sw=track.children[0]?.offsetWidth||1
        track.scrollTo({left:idx*sw,behavior:'smooth'})
      })})
    })
    // Before/After scroll carousel
    document.querySelectorAll('[data-bacarousel]').forEach(function(track){
      var dots=track.parentElement.querySelectorAll('.blk-ba-dot')
      track.addEventListener('scroll',function(){
        var sw=track.children[0]?.offsetWidth||1
        var idx=Math.round(track.scrollLeft/sw)
        dots.forEach(function(d,i){d.classList.toggle('active',i===idx)})
      })
      dots.forEach(function(d){d.addEventListener('click',function(){
        var idx=parseInt(d.dataset.baidx);var sw=track.children[0]?.offsetWidth||1
        track.scrollTo({left:idx*sw,behavior:'smooth'})
      })})
    })
  }

  function initToggles(){
    document.querySelectorAll('.blk-toggle').forEach(function(t){
      t.addEventListener('click',function(){t.classList.toggle('on')})
    })
  }
})()
</script>
