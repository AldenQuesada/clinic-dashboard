<!-- Bootstrap da página (simples — só espera o _sbShared) -->
<script>
(function () {
  'use strict'
  function boot() {
    if (!window._sbShared || !window.B2BShell) {
      return setTimeout(boot, 200)
    }
    window.B2BShell.mount('b2bShellHost')
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot)
  else boot()
})()
</script>
