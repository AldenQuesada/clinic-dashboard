<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Beauty &amp; Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/magazine-pages.css" />
<script src="js/config/env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/magazine/magazine-renderer.js"></script>
<style>
  :root { --ink: #1a1a1a; --ink-soft: #555; --muted: #8a8178; --accent: #7a1f2b; --paper: #fff; --bg: #f4f1ec; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body.loading, body.error { overflow: auto; display: grid; place-items: center; padding: 40px; }

  /* Progress bar */
  .progress-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; gap: 4px; padding: 12px 16px; pointer-events: none; }
  .progress-bar .seg { flex: 1; height: 2px; background: rgba(0,0,0,0.15); border-radius: 2px; overflow: hidden; }
  .progress-bar .seg .fill { display: block; height: 100%; width: 0%; background: var(--ink); transition: width 0.35s ease; }
  .progress-bar .seg.done .fill, .progress-bar .seg.current .fill { width: 100%; }

  /* Top meta */
  .top-meta { position: fixed; top: 22px; left: 0; right: 0; z-index: 40; display: flex; justify-content: space-between; padding: 0 28px; pointer-events: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-soft); mix-blend-mode: difference; filter: invert(1); }
  .top-meta .counter { font-variant-numeric: tabular-nums; }

  /* Scroller */
  .reader { display: flex; height: 100vh; width: 100vw; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }
  .reader::-webkit-scrollbar { display: none; }
  .page {
    flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; scroll-snap-stop: always;
    position: relative; background: var(--paper);
    overflow-x: hidden; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .page::-webkit-scrollbar { display: none; }
  /* Permite que o conteudo do template ultrapasse a viewport e role internamente */
  .page .mp { height: auto !important; min-height: 100%; overflow: visible !important; }
  /* Indicador "mais abaixo" - aparece quando ha conteudo nao visto */
  .page.has-overflow::after {
    content: ''; position: sticky; bottom: 12px; left: 50%; margin: 0 auto -28px;
    width: 32px; height: 32px; border-radius: 50%; display: block;
    background: rgba(0,0,0,0.5) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>") center/16px no-repeat;
    pointer-events: none;
    animation: bounce 1.6s ease-in-out infinite;
  }
  .page.has-overflow.scrolled::after { opacity: 0; transition: opacity .3s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

  /* Nav arrows */
  .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.08); backdrop-filter: blur(8px); cursor: pointer; z-index: 45; display: grid; place-items: center; transition: transform .25s; }
  .nav-arrow:hover { transform: translateY(-50%) scale(1.08); }
  .nav-arrow.prev { left: 20px; } .nav-arrow.next { right: 20px; }
  .nav-arrow svg { width: 18px; height: 18px; stroke: var(--ink); }
  .nav-arrow[hidden] { display: none; }
  @media (max-width: 720px) { .nav-arrow { display: none; } }

  /* Swipe hint */
  .swipe-hint { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 44; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.85); color: #fff; padding: 10px 18px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border-radius: 999px; pointer-events: none; opacity: 0; animation: hint 4s ease 1s forwards; }
  .swipe-hint svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; }
  @keyframes hint { 0% { opacity: 0; transform: translate(-50%, 10px); } 15%,75% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -10px); } }
  @media (prefers-reduced-motion: reduce) { .reader { scroll-behavior: auto; } .swipe-hint { display: none; } }

  /* States */
  .state-card { max-width: 420px; text-align: center; padding: 48px 32px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
  .state-card h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 12px; }
  .state-card p { font-size: 14px; line-height: 1.6; color: var(--ink-soft); }
  .state-card .spinner { width: 32px; height: 32px; margin: 0 auto 18px; border: 2px solid var(--bg); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Reward toast */
  .reward-toast { position: fixed; bottom: 32px; right: 32px; z-index: 60; background: var(--accent); color: #fff; padding: 14px 22px; border-radius: 8px; box-shadow: 0 10px 30px rgba(122,31,43,0.3); font-size: 14px; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; }
  .reward-toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body class="loading">

<div id="stateLoading" class="state-card">
  <div class="spinner"></div>
  <h2>Carregando sua edição</h2>
  <p>Personalizando conteúdo…</p>
</div>

<div id="stateError" class="state-card" style="display:none">
  <h2>Link inválido</h2>
  <p id="errorMsg">Este link não é válido ou expirou. Entre em contato para receber um novo.</p>
</div>

<div class="progress-bar" id="progressBar" style="display:none"></div>
<div class="top-meta" id="topMeta" style="display:none">
  <span class="brand">Beauty &amp; Health</span>
  <span class="counter"><span id="curIdx">1</span> / <span id="totalIdx">0</span></span>
</div>

<button class="nav-arrow prev" id="prevBtn" hidden aria-label="Anterior">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="nav-arrow next" id="nextBtn" hidden aria-label="Próxima">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<div class="reader" id="reader" style="display:none"></div>

<div class="swipe-hint" id="swipeHint" style="display:none">
  <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  Deslize para continuar
</div>

<div class="reward-toast" id="rewardToast"></div>

<script>
;(function () {
  'use strict'

  const sb = window.supabase.createClient(window.ClinicEnv.SUPABASE_URL, window.ClinicEnv.SUPABASE_KEY)

  const qs = new URLSearchParams(location.search)
  const editionSlug = qs.get('edition') || qs.get('e')
  const leadId = qs.get('lead') || qs.get('l')
  const hash = qs.get('h') || ''
  const preview = qs.has('preview')

  const $ = id => document.getElementById(id)

  function showError(msg) {
    $('stateLoading').style.display = 'none'
    $('stateError').style.display = ''
    if (msg) $('errorMsg').textContent = msg
    document.body.className = 'error'
  }

  function showReward(text) {
    const el = $('rewardToast')
    el.textContent = text
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 3200)
  }

  async function init() {
    if (!editionSlug) {
      showError('Link sem edição especificada. Use ?edition=slug&lead=uuid&h=hash.')
      return
    }

    try {
      // 1) Busca edicao + paginas publicas (RPC valida HMAC)
      const { data: ed, error } = await sb.rpc('magazine_get_edition_public', {
        p_edition_slug: editionSlug,
        p_lead_id: leadId,
        p_hash: hash,
      })
      if (error) throw error
      if (!ed) { showError('Edição não encontrada ou não publicada.'); return }

      render(ed)

      // 2) Marca abertura (nao bloqueia render)
      if (leadId && !preview) {
        try {
          const { data: start } = await sb.rpc('magazine_start_reading', {
            p_edition_id: ed.id,
            p_lead_id: leadId,
            p_hash: hash,
            p_user_agent: navigator.userAgent,
            p_ip_hash: null,
          })
          // Primeira abertura -> credita 10 de cashback
          if (start && start.opened_at) showReward('✓ Cashback de abertura creditado (R$ 10)')
        } catch (e) { console.warn('start_reading falhou:', e.message) }
      }
    } catch (e) {
      console.error(e)
      showError(e.message || 'Erro ao carregar edição.')
    }
  }

  function render(ed) {
    const pages = ed.pages || []
    if (!pages.length) { showError('Esta edição não tem páginas publicadas ainda.'); return }

    const reader = $('reader')
    reader.innerHTML = pages.map(p => `<section class="page" data-id="${p.id}">${window.MagazineRenderer.render(p.template_slug, p.slots || {})}</section>`).join('')

    const pb = $('progressBar')
    pb.innerHTML = pages.map((_, i) => `<div class="seg${i === 0 ? ' current' : ''}"><span class="fill"></span></div>`).join('')

    $('totalIdx').textContent = pages.length
    $('stateLoading').style.display = 'none'
    reader.style.display = ''
    pb.style.display = ''
    $('topMeta').style.display = ''
    if (pages.length > 1) { $('nextBtn').hidden = false; $('swipeHint').style.display = ''; setTimeout(() => $('swipeHint').style.display = 'none', 5200) }
    document.body.className = ''

    wireNav(pages, ed)
    document.title = `Beauty & Health — ${ed.title || 'Edição'}`
  }

  function wireNav(pages, ed) {
    const reader = $('reader')
    const prev = $('prevBtn'), next = $('nextBtn')
    let currentIdx = 0
    let maxIdx = 0
    const completed = new Set()

    const updateUi = (idx) => {
      currentIdx = idx
      $('curIdx').textContent = idx + 1
      maxIdx = Math.max(maxIdx, idx)
      completed.add(idx)
      const segs = document.querySelectorAll('.progress-bar .seg')
      segs.forEach((s, i) => {
        s.classList.remove('current', 'done')
        if (i < idx) s.classList.add('done')
        if (i === idx) s.classList.add('current')
      })
      prev.hidden = idx === 0
      next.hidden = idx === pages.length - 1

      // Envia progresso (debounced)
      if (leadId && !preview) sendProgress()
    }

    let progTimer = null
    let lastSent = 0
    function sendProgress() {
      clearTimeout(progTimer)
      progTimer = setTimeout(async () => {
        try {
          const now = Date.now()
          const dt = lastSent ? Math.round((now - lastSent) / 1000) : 0
          lastSent = now
          const { data } = await sb.rpc('magazine_update_progress', {
            p_edition_id: ed.id,
            p_lead_id: leadId,
            p_hash: hash,
            p_page_index: currentIdx,
            p_pages_completed: Array.from(completed),
            p_time_spent_sec: Math.min(dt, 60),
          })
          if (data && data.newly_completed) showReward('✓ 80% lido — cashback extra de R$ 20')
        } catch (e) { console.warn('progress falhou:', e.message) }
      }, 1200)
    }

    // Observer
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.intersectionRatio > 0.5) {
          const idx = Array.from(reader.children).indexOf(en.target)
          if (idx >= 0 && idx !== currentIdx) updateUi(idx)
        }
      })
    }, { root: reader, threshold: [0.5] })
    Array.from(reader.children).forEach(p => io.observe(p))

    prev.addEventListener('click', () => reader.children[Math.max(0, currentIdx - 1)]?.scrollIntoView({ inline: 'start', behavior: 'smooth' }))
    next.addEventListener('click', () => reader.children[Math.min(pages.length - 1, currentIdx + 1)]?.scrollIntoView({ inline: 'start', behavior: 'smooth' }))

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') next.click()
      if (e.key === 'ArrowLeft') prev.click()
    })

    // TOC: clicar em item .mp-t04 .item navega
    reader.addEventListener('click', e => {
      const item = e.target.closest('.mp-t04 .item')
      if (!item) return
      const pid = item.dataset.pageId
      if (!pid) return
      const target = reader.querySelector(`[data-id="${pid}"]`)
      if (target) target.scrollIntoView({ inline: 'start', behavior: 'smooth' })
    })

    updateUi(0)

    // Marca paginas que tem overflow vertical (mostra indicador "deslize abaixo")
    requestAnimationFrame(() => {
      Array.from(reader.children).forEach(p => {
        if (p.scrollHeight > p.clientHeight + 4) p.classList.add('has-overflow')
        p.addEventListener('scroll', () => {
          if (p.scrollTop > 8) p.classList.add('scrolled')
          else p.classList.remove('scrolled')
        }, { passive: true })
      })
    })
  }

  document.addEventListener('DOMContentLoaded', init)
})()
</script>
</body>
</html>
