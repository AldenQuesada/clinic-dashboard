<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #f4f1ec;
    --paper: #fff;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --muted: #8a8178;
    --line: #e5ddd2;
    --accent: #7a1f2b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header.top {
    padding: 36px 40px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
  }
  header.top h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: -0.01em; }
  header.top h1 em { color: var(--accent); font-style: italic; }
  header.top p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  header.top nav { display: flex; gap: 8px; }
  header.top nav a {
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 13px; text-decoration: none; color: var(--ink); background: var(--paper);
  }
  header.top nav a:hover { border-color: var(--accent); color: var(--accent); }
  header.top nav a.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  header.top nav a.primary:hover { background: var(--accent); border-color: var(--accent); }

  .container { max-width: 1400px; margin: 0 auto; padding: 40px; }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap;
    padding-bottom: 16px; border-bottom: 1px solid var(--line);
  }
  .filter-btn {
    padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--paper); font-size: 12px; font-weight: 500; color: var(--ink-soft); cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 32px;
  }

  .card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }

  .card .preview-wrap {
    width: 100%; aspect-ratio: 16/10; background: #fafaf7;
    border-bottom: 1px solid var(--line); overflow: hidden; position: relative;
  }
  .card .preview-wrap iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: 0; pointer-events: none;
  }

  .card .meta {
    padding: 18px 22px; display: flex; justify-content: space-between; align-items: baseline;
    gap: 14px;
  }
  .card .meta .left h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .card .meta .left .slug { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }
  .card .meta .cat {
    padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; background: var(--bg); color: var(--muted);
  }
  .card .meta .cat.cover { background: #fce7ec; color: var(--accent); }
  .card .meta .cat.feature { background: #e8f0ff; color: #1e4a8f; }
  .card .meta .cat.visual { background: #e8f5e8; color: #2d7a43; }
  .card .meta .cat.interactive { background: #fef3c7; color: #b45309; }
  .card .meta .cat.structural { background: #ede9fe; color: #6b21a8; }
  .card .meta .cat.extra { background: #f1f5f9; color: #475569; }

  .card .fields { padding: 0 22px 18px; }
  .card .fields summary {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    cursor: pointer; padding: 6px 0; outline: none;
  }
  .card .fields summary:hover { color: var(--accent); }
  .card .fields .content { padding-top: 8px; font-size: 12px; line-height: 1.6; color: var(--ink-soft); }
  .card .fields .content code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--ink); }
  .card .fields .content .req { color: var(--accent); font-weight: 600; }
  .card .fields .content ul { padding-left: 18px; }

  .card footer {
    padding: 12px 22px; background: #fafaf7; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--muted);
  }
  .card footer strong { color: var(--ink); }
  .card footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .card footer a:hover { text-decoration: underline; }
</style>
</head>

  const grid = document.getElementById('grid')

  function render(filter = 'all') {
    const items = filter === 'all' ? EXAMPLES : EXAMPLES.filter(e => e.cat === filter)
    grid.innerHTML = items.map(e => cardHtml(e)).join('')
    // monta iframes depois pra melhor performance
    items.forEach(e => mountIframe(e))
  }

  function cardHtml(e) {
    return `
      <article class="card" data-slug="${e.slug}">
        <div class="preview-wrap"><iframe data-slug="${e.slug}" title="${e.name}" loading="lazy"></iframe></div>
        <div class="meta">
          <div class="left">
            <h2>${e.name}</h2>
            <div class="slug">${e.slug}</div>
          </div>
          <div class="cat ${e.cat}">${labelCat(e.cat)}</div>
        </div>
        <div class="fields">
          <details>
            <summary>Ver slots deste template</summary>
            <div class="content">${slotsSummary(e)}</div>
          </details>
        </div>
        <footer>
          <span>Slots: <strong>${Object.keys(e.slots).length}</strong></span>
          <a href="docs/magazine-editor-playbook.md#${e.slug}" target="_blank">Ver contrato →</a>
        </footer>
      </article>`
  }

  function labelCat(c) {
    return ({ cover: 'Capa', feature: 'Matéria', visual: 'Visual', interactive: 'Interativo', structural: 'Estrutural', extra: 'Extra' })[c] || c
  }

  function slotsSummary(e) {
    return `<ul>${Object.keys(e.slots).map(k => `<li><code>${k}</code>${k.startsWith('foto') ? ' <span style="color:#888">(imagem)</span>' : typeof e.slots[k] === 'object' ? ' <span style="color:#888">(lista)</span>' : ''}</li>`).join('')}</ul>`
  }

  function mountIframe(e) {
    const iframe = grid.querySelector(`iframe[data-slug="${e.slug}"]`)
    if (!iframe) return
    const pageHtml = window.MagazineRenderer.render(e.slug, e.slots)
    const nat = { w: 1440, h: 900 }
    iframe.srcdoc = `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/magazine-pages.css"/>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#f4f1ec;}
#stage{width:${nat.w}px;height:${nat.h}px;transform-origin:top left;position:absolute;top:0;left:0;}
#stage>.mp{width:100%;height:100%;}
</style></head><body>
<div id="stage">${pageHtml}</div>
<script>(function(){var s=document.getElementById('stage');var sx=window.innerWidth/${nat.w};var sy=window.innerHeight/${nat.h};var k=Math.min(sx,sy);s.style.transform='scale('+k+')';s.style.left=((window.innerWidth-${nat.w}*k)/2)+'px';s.style.top=((window.innerHeight-${nat.h}*k)/2)+'px';})();<\/script>
</body></html>`
  }

  // Filter bar
  document.getElementById('filterBar').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn')
    if (!btn) return
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    render(btn.dataset.cat)
  })

  render('all')
})()
