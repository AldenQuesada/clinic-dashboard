<script>
(function () {
  'use strict';

  // Helpers compartilhados
  window.LPBToast = function (msg, kind) {
    var root = document.getElementById('lpbToastRoot');
    if (!root) return;
    root.innerHTML = '';
    var t = document.createElement('div');
    t.className = 'lpb-toast' + (kind ? ' ' + kind : '');
    t.textContent = msg;
    root.appendChild(t);
    setTimeout(function () {
      if (t.parentNode) t.parentNode.removeChild(t);
    }, 2400);
  };

  window.LPBIcon = function (name, sz) {
    if (typeof feather === 'undefined' || !feather.icons || !feather.icons[name]) return '';
    return feather.icons[name].toSvg({
      width:  sz || 16,
      height: sz || 16,
      'stroke-width': 1.8,
    });
  };

  // ROOT renderer — decide entre lista e editor
  function renderRoot() {
    var view = LPBuilder.getView();
    var root = document.getElementById('lpbRoot');
    if (view === 'editor') {
      // shell 3 colunas — checa por #lpbPalette (id específico do shell)
      if (!root.querySelector('#lpbPalette')) {
        root.innerHTML =
          '<div class="lpb-shell">' +
            '<aside class="lpb-palette" id="lpbPalette"></aside>' +
            '<section class="lpb-canvas-wrap" id="lpbCanvas"></section>' +
            '<aside class="lpb-inspector" id="lpbInspector"></aside>' +
          '</div>';
        if (window.LPBPalette)   window.LPBPalette.mount('lpbPalette');
        if (window.LPBCanvas)    window.LPBCanvas.mount('lpbCanvas');
        if (window.LPBInspector) window.LPBInspector.mount('lpbInspector');
      }
    } else {
      // lista — checa por #lpbPagesList (não pela class .lpb-pages que o
      // HTML inicial de loading também usa)
      if (!root.querySelector('#lpbPagesList')) {
        root.innerHTML = '<div class="lpb-pages" id="lpbPagesList"></div>';
        if (window.LPBPagesList) window.LPBPagesList.mount('lpbPagesList');
      }
    }
    if (window.LPBToolbar) window.LPBToolbar.render();
  }

  // Confirmacao antes de fechar com mudancas nao salvas
  window.addEventListener('beforeunload', function (e) {
    if (LPBuilder.isDirty()) {
      e.preventDefault();
      e.returnValue = 'Você tem mudanças não salvas.';
      return e.returnValue;
    }
  });

  document.body.addEventListener('lpb:state-changed', renderRoot);

  // Boot
  document.addEventListener('DOMContentLoaded', function () {
    renderRoot();
    LPBuilder.loadPages().then(function () {
      // Se URL tem #edit=ID, abre direto no editor (sobrevive F5)
      var hashId = LPBuilder.getPageIdFromHash && LPBuilder.getPageIdFromHash();
      if (hashId) {
        LPBuilder.loadPage(hashId).catch(function (err) {
          console.warn('[lpb] hash page not found:', err);
          // limpa hash invalido
          try { window.history.replaceState(null, '', window.location.pathname); } catch (_) {}
        });
      }
    }).catch(function (err) {
      console.error('[lpb] loadPages error:', err);
      LPBToast('Erro ao carregar páginas', 'error');
    });
  });

  // Reage ao back/forward do browser
  window.addEventListener('hashchange', function () {
    var hashId = LPBuilder.getPageIdFromHash && LPBuilder.getPageIdFromHash();
    var current = LPBuilder.getCurrentPage();
    if (hashId && (!current || current.id !== hashId)) {
      LPBuilder.loadPage(hashId).catch(function () {});
    } else if (!hashId && current) {
      LPBuilder.exitEditor();
    }
  });
})();
</script>
