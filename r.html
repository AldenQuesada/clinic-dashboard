<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#F5F5F5;font-family:-apple-system,'SF Pro Display',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{text-align:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#C9A96E;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:14px;color:#A0A0A0}
.err{color:#EF4444;font-size:13px;margin-top:12px;display:none}
.err a{color:#C9A96E;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Redirecionando...</div>
  <div class="err" id="err">Link n&atilde;o encontrado. <a href="/">Voltar ao in&iacute;cio</a></div>
</div>
<script>
(function(){
  var SB_URL = 'https://oqboitkpcvuaudouwvkl.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xYm9pdGtwY3Z1YXVkb3V3dmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTgyMzQsImV4cCI6MjA5MDAzNDIzNH0.8d1HT8GTxIVsaTtl9eOiijDkWUVDLaTv2W4qahmI8w0';

  var params = new URLSearchParams(window.location.search);
  var code = params.get('c');

  if (!code) { showError(); return; }

  fetch(SB_URL + '/rest/v1/rpc/wa_birthday_track_link_open', {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ p_code: code })
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    if (!data || !data.ok || !data.url) { showError(); return; }

    var pixels = data.pixels || {};
    var hasPixels = !!(
      pixels.meta_pixel_id ||
      pixels.google_ads_id ||
      pixels.google_analytics_id ||
      pixels.tiktok_pixel_id ||
      pixels.custom_head
    );

    if (!hasPixels) {
      doRedirect(data.url);
      return;
    }

    firePixels(pixels, data.url);
  })
  .catch(function() { showError(); });

  // ── Fire all configured pixels ──────────────────────────────
  function firePixels(px, url) {
    var fired = 0;
    var total = 0;

    // Count expected pixels
    if (px.meta_pixel_id) total++;
    if (px.google_ads_id) total++;
    if (px.google_analytics_id) total++;
    if (px.tiktok_pixel_id) total++;

    // Safety timeout: redirect after 3s max even if pixels fail
    var timeout = setTimeout(function() { doRedirect(url); }, 3000);

    function checkDone() {
      fired++;
      if (fired >= total) {
        clearTimeout(timeout);
        // Small delay to ensure pixel beacons are sent
        setTimeout(function() { doRedirect(url); }, 300);
      }
    }

    // If only custom_head and no standard pixels, redirect after injection
    if (total === 0) {
      injectCustomHead(px.custom_head);
      setTimeout(function() { doRedirect(url); }, 800);
      return;
    }

    // ── Meta Pixel ──────────────────────────────────────────
    if (px.meta_pixel_id) {
      try {
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){
        n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;
        s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(
        window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', px.meta_pixel_id);
        fbq('track', 'PageView');
        if (px.meta_event && px.meta_event !== 'PageView') {
          fbq('track', px.meta_event);
        }
        // noscript fallback image
        var img = new Image();
        img.src = 'https://www.facebook.com/tr?id=' + encodeURIComponent(px.meta_pixel_id) + '&ev=PageView&noscript=1';
        img.onload = img.onerror = checkDone;
      } catch(e) { checkDone(); }
    }

    // ── Google Ads / Analytics (gtag.js) ────────────────────
    if (px.google_ads_id || px.google_analytics_id) {
      try {
        var gtagId = px.google_ads_id || px.google_analytics_id;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(gtagId);
        s.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){ dataLayer.push(arguments); }
          gtag('js', new Date());

          if (px.google_analytics_id) {
            gtag('config', px.google_analytics_id, { send_page_view: true });
            if (px.ga_event) {
              gtag('event', px.ga_event);
            }
          }

          if (px.google_ads_id) {
            gtag('config', px.google_ads_id);
            if (px.google_ads_label) {
              gtag('event', 'conversion', {
                send_to: px.google_ads_id + '/' + px.google_ads_label
              });
            }
          }

          // Google Ads e Analytics compartilham o mesmo script
          if (px.google_ads_id) checkDone();
          if (px.google_analytics_id) checkDone();
        };
        s.onerror = function() {
          if (px.google_ads_id) checkDone();
          if (px.google_analytics_id) checkDone();
        };
        document.head.appendChild(s);
      } catch(e) {
        if (px.google_ads_id) checkDone();
        if (px.google_analytics_id) checkDone();
      }
    }

    // ── TikTok Pixel ────────────────────────────────────────
    if (px.tiktok_pixel_id) {
      try {
        !function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];
        ttq.methods=["page","track","identify","instances","debug","on","off",
        "once","ready","alias","group","enableCookie","disableCookie"];
        ttq.setAndDefer=function(t,e){t[e]=function(){
        t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
        for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
        ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)
        ttq.setAndDefer(e,ttq.methods[n]);return e};ttq.load=function(e,n){
        var i="https://analytics.tiktok.com/i18n/pixel/events.js";
        ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=i;ttq._t=ttq._t||{};
        ttq._t[e+\"_\"+n]=+new Date;ttq._o=ttq._o||{};ttq._o[e]=n||{};
        var o=d.createElement("script");o.type="text/javascript";o.async=!0;
        o.src=i+"?sdkid="+e+"&lib="+t;var a=d.getElementsByTagName("script")[0];
        a.parentNode.insertBefore(o,a)}}(window,document,"ttq");
        ttq.load(px.tiktok_pixel_id);
        ttq.page();
        if (px.tiktok_event) {
          ttq.track(px.tiktok_event);
        }
        // Beacon image fallback
        var img = new Image();
        img.src = 'https://analytics.tiktok.com/i18n/pixel/events.js?sdkid=' + encodeURIComponent(px.tiktok_pixel_id);
        img.onload = img.onerror = checkDone;
      } catch(e) { checkDone(); }
    }

    // ── Custom head tags ────────────────────────────────────
    if (px.custom_head) {
      injectCustomHead(px.custom_head);
    }
  }

  // ── Inject custom HTML/script into head ─────────────────
  function injectCustomHead(html) {
    if (!html) return;
    var container = document.createElement('div');
    container.innerHTML = html;
    var scripts = container.querySelectorAll('script');
    scripts.forEach(function(oldScript) {
      var newScript = document.createElement('script');
      if (oldScript.src) { newScript.src = oldScript.src; newScript.async = true; }
      else { newScript.textContent = oldScript.textContent; }
      document.head.appendChild(newScript);
    });
    // Non-script elements (noscript, img, etc.)
    var nonScripts = container.querySelectorAll(':not(script)');
    nonScripts.forEach(function(el) {
      document.head.appendChild(el.cloneNode(true));
    });
  }

  function doRedirect(url) {
    // Fase 9 Entrega 1 (VPI): preserva utm_* / session_id no redirect
    // pra que a landing (public_embaixadora.html) possa capturar e
    // gravar attribution via vpi_pub_track_attribution.
    try {
      var hostParams = new URLSearchParams(window.location.search);
      var carry = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','sid'];
      var hasAny = false;
      carry.forEach(function(k){ if (hostParams.get(k)) hasAny = true; });
      if (hasAny) {
        var destUrl;
        try { destUrl = new URL(url, window.location.origin); }
        catch(_){ destUrl = null; }
        if (destUrl) {
          carry.forEach(function(k){
            var v = hostParams.get(k);
            if (v != null && !destUrl.searchParams.has(k)) {
              destUrl.searchParams.set(k, v);
            }
          });
          url = destUrl.toString();
        }
      }
    } catch(_){ /* fallback: redirect cru */ }
    window.location.replace(url);
  }

  function showError() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
})();
</script>
</body>
</html>
