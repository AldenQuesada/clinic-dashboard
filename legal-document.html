<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consentimento Digital — Mirian de Paula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/env.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-family:'Inter',sans-serif;background:#FAFBFC;color:#111827;-webkit-text-size-adjust:100%}
    body{min-height:100vh;min-height:100dvh}

    .ld-shell{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

    /* Header premium */
    .ld-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    .ld-header-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#C9A96E,#D4B978);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:16px;color:#1a1a2e;letter-spacing:-1px}
    .ld-header-info{flex:1;min-width:0}
    .ld-header-title{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ld-header-sub{font-size:11px;color:#C9A96E;margin-top:2px;font-weight:500}
    .ld-header-badge{font-size:9px;padding:3px 10px;background:rgba(201,169,110,.15);color:#C9A96E;border:1px solid rgba(201,169,110,.25);border-radius:20px;font-weight:600;letter-spacing:.5px;white-space:nowrap}

    /* Stepper */
    .ld-stepper{background:#fff;border-bottom:1px solid #E5E7EB;padding:16px 20px;display:flex;justify-content:center;gap:0}
    .ld-step-item{display:flex;align-items:center;gap:0}
    .ld-step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s ease;flex-shrink:0}
    .ld-step-dot.pending{background:#F3F4F6;color:#9CA3AF;border:2px solid #E5E7EB}
    .ld-step-dot.active{background:linear-gradient(135deg,#C9A96E,#D4B978);color:#1a1a2e;border:2px solid #C9A96E;box-shadow:0 0 0 4px rgba(201,169,110,.2);animation:ldPulse 2s ease infinite}
    .ld-step-dot.done{background:#10B981;color:#fff;border:2px solid #10B981}
    .ld-step-dot svg{width:14px;height:14px}
    .ld-step-line{width:40px;height:2px;background:#E5E7EB;margin:0 4px;transition:background .3s}
    .ld-step-line.done{background:#10B981}
    @keyframes ldPulse{0%,100%{box-shadow:0 0 0 4px rgba(201,169,110,.2)}50%{box-shadow:0 0 0 8px rgba(201,169,110,.1)}}

    /* Progress bar */
    .ld-progress{height:3px;background:#E5E7EB}
    .ld-progress-fill{height:100%;background:linear-gradient(90deg,#C9A96E,#D4B978);transition:width .4s ease;border-radius:0 3px 3px 0}

    /* Content */
    .ld-content{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:16px 16px 20px}
    .ld-card{width:100%;max-width:560px;background:#fff;border-radius:20px;border:1px solid #E5E7EB;overflow:hidden;animation:ldSlide .4s ease;box-shadow:0 4px 24px rgba(0,0,0,.06)}
    @keyframes ldSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .ld-card-header{padding:20px 20px 14px;border-bottom:1px solid #F3F4F6;background:linear-gradient(180deg,#FAFBFC,#fff)}
    .ld-step-label{font-size:10px;font-weight:700;color:#C9A96E;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .ld-step-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.3px}
    .ld-step-desc{font-size:12px;color:#6B7280;margin-top:6px;line-height:1.6}

    .ld-card-body{padding:20px}

    /* Toast */
    .ld-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:1000;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;transition:transform .3s ease;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.15)}
    .ld-toast.show{transform:translateX(-50%) translateY(0)}
    .ld-toast.error{background:linear-gradient(135deg,#EF4444,#DC2626)}
    .ld-toast.warning{background:linear-gradient(135deg,#F59E0B,#D97706)}
    .ld-toast.success{background:linear-gradient(135deg,#10B981,#059669)}

    /* Form fields */
    .ld-field{margin-bottom:18px}
    .ld-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block}
    .ld-input{width:100%;padding:12px 16px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:14px;font-family:inherit;color:#111;background:#FAFBFC;outline:none;transition:all .2s}
    .ld-input:focus{border-color:#C9A96E;background:#fff;box-shadow:0 0 0 4px rgba(201,169,110,.1)}
    .ld-input.error{border-color:#EF4444;background:#FEF2F2}
    .ld-field-error{font-size:11px;color:#EF4444;margin-top:4px;display:none}
    .ld-field-error.show{display:block}

    /* Document text */
    .ld-doc-text{max-height:65vh;overflow-y:auto;padding:24px;background:#FAFBFC;border:1px solid #E5E7EB;border-radius:12px;font-size:13px;line-height:1.8;color:#1F2937;word-wrap:break-word}
    .ld-doc-text p{margin-bottom:12px}
    .ld-doc-text ul,.ld-doc-text ol{margin:8px 0;padding-left:24px}
    .ld-doc-text li{margin-bottom:4px}
    .ld-doc-text h2,.ld-doc-text h3{margin:16px 0 8px;color:#111}
    .ld-doc-text::-webkit-scrollbar{width:4px}
    .ld-doc-text::-webkit-scrollbar-thumb{background:#C9A96E;border-radius:4px}
    .ld-scroll-hint{text-align:center;padding:10px;font-size:11px;color:#C9A96E;font-weight:600;display:none;animation:ldBounce 1.5s ease infinite}
    @keyframes ldBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

    /* Signature canvas */
    .ld-sig-container{border:2px dashed #D1D5DB;border-radius:16px;background:#FAFBFC;position:relative;overflow:hidden;touch-action:none;transition:all .2s}
    .ld-sig-container.active{border-color:#C9A96E;border-style:solid;background:#fff;box-shadow:0 0 0 4px rgba(201,169,110,.1)}
    .ld-sig-canvas{width:100%;display:block;cursor:crosshair}
    .ld-sig-guide{position:absolute;bottom:25%;left:10%;right:10%;height:1px;border-bottom:1px dashed #D1D5DB;pointer-events:none;opacity:.6}
    .ld-sig-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9CA3AF;font-size:13px;pointer-events:none;transition:opacity .2s;gap:6px}
    .ld-sig-placeholder svg{opacity:.4}
    .ld-sig-actions{display:flex;justify-content:flex-end;margin-top:10px;gap:8px}
    .ld-sig-clear{padding:8px 16px;background:#FEF2F2;color:#EF4444;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}

    /* Checkbox */
    .ld-check{display:flex;align-items:flex-start;gap:12px;margin:18px 0;padding:16px;background:linear-gradient(135deg,#FEFCE8,#FEF9C3);border:1px solid #C9A96E30;border-radius:12px;cursor:pointer;transition:all .2s}
    .ld-check:hover{border-color:#C9A96E60}
    .ld-check input{width:20px;height:20px;margin-top:1px;accent-color:#C9A96E;flex-shrink:0}
    .ld-check-text{font-size:12px;color:#92400E;line-height:1.6;font-weight:500}

    /* Buttons */
    .ld-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
    .ld-btn-primary{background:linear-gradient(135deg,#C9A96E,#D4B978);color:#1a1a2e;box-shadow:0 4px 12px rgba(201,169,110,.3)}
    .ld-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,169,110,.4)}
    .ld-btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .ld-btn-secondary{background:#F3F4F6;color:#374151;margin-top:10px}
    .ld-btn-secondary:hover{background:#E5E7EB}

    /* States */
    .ld-loading{text-align:center;padding:60px 28px}
    .ld-loading-spinner{width:44px;height:44px;border:3px solid #E5E7EB;border-top-color:#C9A96E;border-radius:50%;animation:ldSpin .8s linear infinite;margin:0 auto 16px}
    @keyframes ldSpin{to{transform:rotate(360deg)}}
    .ld-error{text-align:center;padding:60px 28px;color:#EF4444}
    .ld-error svg{margin-bottom:16px}

    /* Success premium */
    .ld-success{text-align:center;padding:40px 28px}
    .ld-success-check{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:ldCheckPop .5s ease;box-shadow:0 8px 24px rgba(16,185,129,.3)}
    @keyframes ldCheckPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    .ld-success-check svg{color:#fff;animation:ldCheckDraw .4s ease .3s both}
    @keyframes ldCheckDraw{from{stroke-dashoffset:30}to{stroke-dashoffset:0}}
    .ld-success-title{font-size:22px;font-weight:800;color:#111;margin-bottom:8px;letter-spacing:-.3px}
    .ld-success-text{font-size:13px;color:#6B7280;line-height:1.7;margin-bottom:24px}
    .ld-success-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:20px;margin-bottom:20px;color:#fff;text-align:left}
    .ld-success-card-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#C9A96E;font-weight:700;margin-bottom:12px}
    .ld-success-card-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.08)}
    .ld-success-card-row:last-child{border-bottom:none}
    .ld-success-card-label{color:#9CA3AF}
    .ld-success-card-value{font-weight:600;color:#fff}
    .ld-success-seal{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,#10B98115,#059669 10);border:1.5px solid #10B981;border-radius:12px;color:#10B981;font-weight:700;font-size:11px;margin-bottom:16px;letter-spacing:.5px}
    .ld-success-btns{display:flex;gap:10px;margin-bottom:16px}
    .ld-success-btns .ld-btn{flex:1}
    .ld-hash{font-size:9px;color:#9CA3AF;word-break:break-all;background:#F9FAFB;padding:10px;border-radius:10px;font-family:monospace;text-align:left}
    .ld-lgpd{font-size:10px;color:#9CA3AF;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}
    .ld-lgpd svg{flex-shrink:0}

    @media(max-width:480px){
      .ld-content{padding:8px 10px 12px}
      .ld-card{border-radius:14px}
      .ld-card-body{padding:14px}
      .ld-card-header{padding:14px 14px 10px}
      .ld-step-title{font-size:17px}
      .ld-doc-text{font-size:12px;padding:12px;max-height:60vh}
      .ld-step-line{width:24px}
      .ld-stepper{padding:12px 12px}
      .ld-success-btns{flex-direction:column}
    }
    @media(max-width:360px){
      .ld-step-dot{width:28px;height:28px;font-size:11px}
      .ld-step-line{width:16px}
    }
  </style>
</head>
<body>
  <div class="ld-shell">
    <div class="ld-header">
      <div class="ld-header-logo">MP</div>
      <div class="ld-header-info">
        <div class="ld-header-title" id="ldHeaderTitle">Mirian de Paula Beauty & Health</div>
        <div class="ld-header-sub" id="ldHeaderSub">Consentimento Digital</div>
      </div>
      <div class="ld-header-badge">SEGURO</div>
    </div>
    <div id="ldStepper" class="ld-stepper" style="display:none"></div>
    <div class="ld-progress"><div class="ld-progress-fill" id="ldProgress" style="width:0%"></div></div>
    <div class="ld-content"><div id="ldRoot"></div></div>
  </div>
  <div id="ldToast" class="ld-toast"></div>
  <script src="js/legal-document-public.js"></script>
</body>
</html>
