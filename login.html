<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicAI — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/env.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #7C3AED, #5B21B6);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; color: #111; }
    .logo p  { font-size: 14px; color: #6B7280; margin-top: 4px; }
    .alert {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .alert-error   { background: #FEE2E2; color: #DC2626; }
    .alert-success { background: #F0FDF4; color: #15803D; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #7C3AED; }
    .field { margin-bottom: 14px; }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #9CA3AF;
      display: flex; align-items: center;
      padding: 0;
    }
    .remember-row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 20px;
    }
    .remember-row input { width: 15px; height: 15px; accent-color: #7C3AED; cursor: pointer; }
    .remember-row label { font-size: 13px; color: #374151; cursor: pointer; margin: 0; }
    .btn-primary {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #7C3AED, #5B21B6);
      color: #fff; border: none;
      border-radius: 9px; font-size: 15px;
      font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-link {
      background: none; border: none;
      font-size: 12px; color: #7C3AED;
      cursor: pointer; padding: 0;
      font-weight: 500; font-family: 'Inter', sans-serif;
    }
    .footer {
      text-align: center;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #F3F4F6;
      font-size: 13px;
      color: #6B7280;
    }

    /* Forgot password view */
    #viewForgot { display: none; }
    #viewReset  { display: none; }
  </style>
</head>
<body>

<div class="card">

  <!-- ── Login View ── -->
  <div id="viewLogin">
    <div class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <h1>ClinicAI</h1>
      <p>Faça login para continuar</p>
    </div>

    <div id="loginAlert" class="alert alert-error"></div>

    <form id="loginForm" autocomplete="on" onsubmit="event.preventDefault(); submitLogin()">
      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input id="loginEmail" name="email" type="email" autocomplete="email" placeholder="seu@email.com.br" />
      </div>
      <div class="field">
        <div class="field-row">
          <label for="loginPassword">Senha</label>
          <button type="button" class="btn-link" onclick="showForgot()">Esqueci minha senha</button>
        </div>
        <div class="pw-wrap">
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="••••••••" />
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="remember-row">
        <input id="loginRemember" type="checkbox" />
        <label for="loginRemember">Lembrar neste dispositivo</label>
      </div>
      <button id="loginBtn" class="btn-primary" type="submit">Entrar</button>
    </form>
  </div>

  <!-- ── Forgot Password View ── -->
  <div id="viewForgot">
    <div class="logo">
      <div class="logo-icon" style="background: #EDE9FE">
        <svg width="22" height="22" fill="none" stroke="#7C3AED" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 style="font-size:20px">Recuperar Senha</h1>
      <p>Enviaremos um link para o seu e-mail</p>
    </div>

    <div id="forgotAlert" class="alert"></div>

    <div class="field">
      <label for="forgotEmail">E-mail cadastrado</label>
      <input id="forgotEmail" type="email" placeholder="seu@email.com.br" />
    </div>
    <button id="forgotBtn" class="btn-primary" onclick="submitForgot()">Enviar instruções</button>
    <div class="footer">
      <button class="btn-link" style="font-size:13px; color:#6B7280" onclick="showLogin()">
        &larr; Voltar ao login
      </button>
    </div>
  </div>

  <!-- ── Reset Password View ── -->
  <div id="viewReset">
    <div class="logo">
      <div class="logo-icon" style="background: #EDE9FE">
        <svg width="22" height="22" fill="none" stroke="#7C3AED" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 style="font-size:20px">Nova Senha</h1>
      <p>Digite sua nova senha de acesso</p>
    </div>

    <div id="resetAlert" class="alert"></div>

    <div class="field">
      <label for="resetPassword">Nova senha</label>
      <div class="pw-wrap">
        <input id="resetPassword" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
        <button type="button" class="pw-toggle" onclick="togglePw('resetPassword', this)">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="field">
      <label for="resetPasswordConfirm">Confirmar nova senha</label>
      <div class="pw-wrap">
        <input id="resetPasswordConfirm" type="password" placeholder="Repita a senha" autocomplete="new-password" />
        <button type="button" class="pw-toggle" onclick="togglePw('resetPasswordConfirm', this)">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button id="resetBtn" class="btn-primary" onclick="submitReset()">Salvar nova senha</button>
  </div>

</div>

<script>
;(function () {
  'use strict'

  const _env = window.ClinicEnv || {}
  const SUPABASE_URL = _env.SUPABASE_URL || ''
  const SUPABASE_KEY = _env.SUPABASE_KEY || ''

  // Captura sinais de recovery ANTES do SDK processar (hash ou code PKCE)
  var _isRecovery = window.location.hash.includes('type=recovery')
                 || window.location.search.includes('type=recovery')

  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  // PASSWORD_RECOVERY: detectado via onAuthStateChange
  _sb.auth.onAuthStateChange(function (event, session) {
    if (event === 'PASSWORD_RECOVERY') {
      showReset()
    } else if (event === 'SIGNED_IN' && session && !_isRecovery) {
      // Login explícito → vai para o dashboard
      window.location.replace('index.html')
    }
  })

  // Já logado (sessão válida existente) → vai direto para o dashboard
  // Usa getSession() que auto-renova token expirado via refresh token
  if (!_isRecovery) {
    _sb.auth.getSession().then(function (res) {
      if (res.data && res.data.session) {
        window.location.replace('index.html')
      }
    })
  }

  // ── Helpers de UI ──────────────────────────────────────────
  function setAlert(id, msg, type) {
    var el = document.getElementById(id)
    el.textContent = msg
    el.className = 'alert alert-' + type
    el.style.display = msg ? 'block' : 'none'
  }

  function setLoading(btnId, loading, text) {
    var btn = document.getElementById(btnId)
    btn.disabled = loading
    btn.textContent = loading ? 'Aguarde...' : text
  }

  // ── Toggle senha visível ───────────────────────────────────
  window.togglePw = function (inputId, btn) {
    var input = document.getElementById(inputId)
    var isText = input.type === 'text'
    input.type = isText ? 'password' : 'text'
    btn.style.color = isText ? '#9CA3AF' : '#7C3AED'
  }

  // ── Views ──────────────────────────────────────────────────
  window.showForgot = function () {
    document.getElementById('viewLogin').style.display = 'none'
    document.getElementById('viewForgot').style.display = 'block'
    setAlert('forgotAlert', '', 'error')
    document.getElementById('forgotEmail').value = document.getElementById('loginEmail').value
    document.getElementById('forgotEmail').focus()
  }

  window.showLogin = function () {
    document.getElementById('viewForgot').style.display = 'none'
    document.getElementById('viewReset').style.display  = 'none'
    document.getElementById('viewLogin').style.display  = 'block'
    setAlert('loginAlert', '', 'error')
  }

  function showReset() {
    document.getElementById('viewLogin').style.display  = 'none'
    document.getElementById('viewForgot').style.display = 'none'
    document.getElementById('viewReset').style.display  = 'block'
    setAlert('resetAlert', '', 'error')
    document.getElementById('resetPassword').focus()
  }

  // ── Login ──────────────────────────────────────────────────
  window.submitLogin = async function () {
    var email = document.getElementById('loginEmail').value.trim()
    var pass  = document.getElementById('loginPassword').value

    setAlert('loginAlert', '', 'error')

    if (!email || !pass) {
      setAlert('loginAlert', 'Preencha e-mail e senha.', 'error')
      return
    }

    setLoading('loginBtn', true, 'Entrar')

    try {
      var res = await _sb.auth.signInWithPassword({ email: email, password: pass })
      if (res.error) throw res.error
      window.location.replace('index.html')
    } catch (err) {
      var msg = err.message || 'Erro ao fazer login'
      if (msg.toLowerCase().includes('invalid login')) msg = 'E-mail ou senha incorretos.'
      setAlert('loginAlert', msg, 'error')
      setLoading('loginBtn', false, 'Entrar')
    }
  }

  // ── Recuperar senha ────────────────────────────────────────
  window.submitForgot = async function () {
    var email = document.getElementById('forgotEmail').value.trim()
    setAlert('forgotAlert', '', 'error')

    if (!email) {
      setAlert('forgotAlert', 'Informe seu e-mail.', 'error')
      return
    }

    setLoading('forgotBtn', true, 'Enviar instruções')

    try {
      var res = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      })
      if (res.error) throw res.error
      setAlert('forgotAlert', 'Instruções enviadas! Verifique sua caixa de entrada.', 'success')
    } catch (err) {
      setAlert('forgotAlert', err.message || 'Erro ao enviar instruções.', 'error')
    } finally {
      setLoading('forgotBtn', false, 'Enviar instruções')
    }
  }

  // ── Salvar nova senha ──────────────────────────────────────
  window.submitReset = async function () {
    var pass    = document.getElementById('resetPassword').value
    var confirm = document.getElementById('resetPasswordConfirm').value
    setAlert('resetAlert', '', 'error')

    if (pass.length < 6) {
      setAlert('resetAlert', 'Senha deve ter ao menos 6 caracteres.', 'error')
      return
    }
    if (pass !== confirm) {
      setAlert('resetAlert', 'As senhas não coincidem.', 'error')
      return
    }

    setLoading('resetBtn', true, 'Salvar nova senha')

    try {
      var res = await _sb.auth.updateUser({ password: pass })
      if (res.error) throw res.error
      setAlert('resetAlert', 'Senha atualizada! Redirecionando...', 'success')
      setTimeout(function () { window.location.replace('index.html') }, 1500)
    } catch (err) {
      setAlert('resetAlert', err.message || 'Erro ao atualizar senha.', 'error')
      setLoading('resetBtn', false, 'Salvar nova senha')
    }
  }

})()
</script>

</body>
</html>
