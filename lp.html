<style>
  /* Loader inicial — antes do schema chegar */
  .lp-loader {
    min-height: 60vh;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 16px;
  }
  .lp-loader-spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--bege);
    border-top-color: var(--champagne);
    border-radius: 50%;
    animation: lp-spin .7s linear infinite;
  }
  .lp-loader-text {
    font-family: 'Montserrat', sans-serif; font-size: 11px;
    letter-spacing: 4px; text-transform: uppercase; color: var(--champagne-dk);
  }
  @keyframes lp-spin { to { transform: rotate(360deg); } }

  .lp-error {
    min-height: 70vh;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 14px; text-align: center; padding: 40px 24px;
  }
  .lp-error h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300; font-style: italic; color: var(--graphite);
  }
  .lp-error p { font-size: 13px; color: var(--graphite-mute); max-width: 380px; }

  /* A11y · skip link (WCAG 2.4.1) */
  .lp-skip {
    position: absolute; left: -9999px; top: 0;
    background: #2C2C2C; color: #fff; padding: 10px 16px;
    font-family: 'Montserrat', sans-serif; font-size: 12px; letter-spacing: 1px;
    text-transform: uppercase; text-decoration: none; z-index: 10000;
  }
  .lp-skip:focus {
    left: 12px; top: 12px;
    outline: 2px solid var(--champagne); outline-offset: 2px;
  }
  /* Focus visible global (WCAG 2.4.7) */
  *:focus-visible {
    outline: 2px solid var(--champagne, #C8A97E);
    outline-offset: 2px;
  }
</style>

<!-- LP Renderer -->
<script>
(function () {
  'use strict';

  var SB_URL = 'https://oqboitkpcvuaudouwvkl.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xYm9pdGtwY3Z1YXVkb3V3dmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTgyMzQsImV4cCI6MjA5MDAzNDIzNH0.8d1HT8GTxIVsaTtl9eOiijDkWUVDLaTv2W4qahmI8w0';

  // ────────────────────────────────────────────────────────────
  // Helpers
  // ────────────────────────────────────────────────────────────
  function $(sel, root) { return (root || document).querySelector(sel); }
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
  // Markdown leve: *bold*, _italic_, quebras de linha
  function richtext(s) {
    if (s == null) return '';
    return esc(s)
      .replace(/\*([^*]+)\*/g, '<em style="color:var(--champagne-dk)">$1</em>')
      .replace(/_([^_]+)_/g,   '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function rpc(name, params) {
    return fetch(SB_URL + '/rest/v1/rpc/' + name, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(params || {})
    }).then(function (r) { return r.json(); });
  }

  // ────────────────────────────────────────────────────────────
  // A/B split: se page tem ab_variant_slug e URL não força, faz 50/50
  // Persiste decisão por sessão (mesmo user vê sempre mesma variant).
  // Retorna true se redirecionou (page render abortado).
  // ────────────────────────────────────────────────────────────
  function maybeRedirectAbVariant(data) {
    if (!data.ab_variant_slug) return false;
    var qs = new URLSearchParams(window.location.search);
    if (qs.get('ab') === '0' || qs.get('ab') === 'a') return false; // forçou A
    if (qs.get('ab') === 'b') {
      _swapSlug(data.ab_variant_slug);
      return true;
    }
    var key = 'lp_ab_' + (data.slug || '');
    var stored = null;
    try { stored = sessionStorage.getItem(key); } catch (_) {}
    if (stored === 'b') { _swapSlug(data.ab_variant_slug); return true; }
    if (stored === 'a') return false;
    // primeira visita: 50/50
    var roll = Math.random() < 0.5 ? 'a' : 'b';
    try { sessionStorage.setItem(key, roll); } catch (_) {}
    if (roll === 'b') { _swapSlug(data.ab_variant_slug); return true; }
    return false;
  }
  function _swapSlug(newSlug) {
    var u = new URL(window.location.href);
    u.searchParams.set('s', newSlug);
    u.searchParams.set('ab', 'b'); // marca pra evitar loop infinito
    window.location.replace(u.toString());
  }

  // ────────────────────────────────────────────────────────────
  // Inject tracking pixels (GA4, FB Pixel, GTM, custom HTML)
  // ────────────────────────────────────────────────────────────
  function injectTracking(tracking) {
    if (!tracking || typeof tracking !== 'object') return;
    var head = document.head;

    // Google Analytics 4
    if (tracking.ga4_id && /^G-[A-Z0-9]+$/i.test(tracking.ga4_id)) {
      var s1 = document.createElement('script');
      s1.async = true;
      s1.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(tracking.ga4_id);
      head.appendChild(s1);
      var s2 = document.createElement('script');
      s2.text = "window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','" + tracking.ga4_id + "');";
      head.appendChild(s2);
    }

    // Facebook Pixel
    if (tracking.fb_pixel_id && /^\d+$/.test(tracking.fb_pixel_id)) {
      var s3 = document.createElement('script');
      s3.text = "!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','" + tracking.fb_pixel_id + "');fbq('track','PageView');";
      head.appendChild(s3);
    }

    // Google Tag Manager
    if (tracking.gtm_id && /^GTM-[A-Z0-9]+$/i.test(tracking.gtm_id)) {
      var s4 = document.createElement('script');
      s4.text = "(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','" + tracking.gtm_id + "');";
      head.appendChild(s4);
    }

    // Custom HTML no head (avançado · usuário responsável pelo conteúdo)
    if (tracking.custom_head_html && typeof tracking.custom_head_html === 'string') {
      var div = document.createElement('div');
      div.innerHTML = tracking.custom_head_html;
      while (div.firstChild) head.appendChild(div.firstChild);
    }
  }

  // ────────────────────────────────────────────────────────────
  // Tokens override → CSS variables
  // ────────────────────────────────────────────────────────────
  function applyTokensOverride(overrides) {
    if (!overrides || typeof overrides !== 'object') return;
    var root = document.documentElement;
    Object.keys(overrides).forEach(function (k) {
      // ex: "colors.champagne" → "--color-champagne"
      var parts = k.split('.');
      var varName = '--' + parts.map(function (p) {
        return p.replace(/([A-Z])/g, '-$1').toLowerCase();
      }).join('-');
      root.style.setProperty(varName, overrides[k]);
    });
  }

  // ────────────────────────────────────────────────────────────
  // Block renderers — um por tipo (mapeado a lp-shared.css)
  // ────────────────────────────────────────────────────────────
  var Blocks = {

    'nav': function (b) {
      var p = b.props || {};
      var ctaHtml = '';
      if (p.cta_enabled !== false && p.cta && p.cta.label) {
        ctaHtml = '<a href="#" class="btn btn-outline btn-sm hide-mobile" '
                + 'data-wa-message="' + esc(p.cta.message_wa || '') + '">'
                + esc(p.cta.label) + '</a>';
      }
      return ''
        + '<nav class="lp-nav">'
        +   '<div class="lp-nav-inner">'
        +     '<div class="brand">'
        +       '<span class="brand-small">' + esc(p.brand_small || 'Clinica') + '</span>'
        +       '<span class="brand-name">' + esc(p.brand_name || '') + '</span>'
        +     '</div>'
        +     ctaHtml
        +   '</div>'
        + '</nav>';
    },

    'hero-split': function (b) {
      var p = b.props || {};
      var ctas = '';
      if (p.cta_primary && p.cta_primary.label) {
        ctas += '<a href="#" class="btn btn-primary btn-large" '
              + 'data-wa-message="' + esc(p.cta_primary.message_wa || '') + '">'
              + esc(p.cta_primary.label) + '</a>';
      }
      if (p.cta_secondary && p.cta_secondary.label) {
        var url = p.cta_secondary.url || '#como-funciona';
        ctas += '<a href="' + esc(url) + '" class="btn btn-outline btn-large">'
              + esc(p.cta_secondary.label) + '</a>';
      }
      var visual = p.visual_image
        ? '<img src="' + esc(p.visual_image) + '" alt="" '
          + 'style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">'
        : '<div class="hero-visual-placeholder">' + esc(p.visual_placeholder || '') + '</div>';

      return ''
        + '<header class="hero">'
        +   '<div class="container">'
        +     '<div class="hero-grid">'
        +       '<div class="hero-text">'
        +         (p.eyebrow ? '<div class="eyebrow">' + esc(p.eyebrow) + '</div>' : '')
        +         '<h1>' + richtext(p.h1 || '') + '</h1>'
        +         (p.lead ? '<p class="lead">' + esc(p.lead) + '</p>' : '')
        +         '<div class="hero-ctas">' + ctas + '</div>'
        +       '</div>'
        +       '<div class="hero-visual">' + visual + '</div>'
        +     '</div>'
        +   '</div>'
        + '</header>';
    },

    'problema-center': function (b) {
      var p = b.props || {};
      var sectionClass = p.bg === 'bege' ? 'section-alt' : '';
      return ''
        + '<section class="' + sectionClass + '">'
        +   '<div class="container-narrow text-center">'
        +     (p.eyebrow ? '<div class="eyebrow reveal">' + esc(p.eyebrow) + '</div>' : '')
        +     '<h2 class="reveal">' + esc(p.h2 || '') + '</h2>'
        +     (p.lead ? '<p class="lead reveal" style="margin-top:28px">' + esc(p.lead) + '</p>' : '')
        +   '</div>'
        + '</section>';
    },

    'cards-2col': function (b) {
      var p = b.props || {};
      var sectionClass = p.bg === 'bege' ? 'section-alt' : '';
      var introHtml = ''
        + '<div class="block-intro reveal">'
        +   (p.eyebrow ? '<div class="eyebrow">' + esc(p.eyebrow) + '</div>' : '')
        +   '<h2>' + esc(p.h2 || '') + '</h2>'
        +   (p.intro
            ? '<p style="margin-top:18px;max-width:640px;margin-left:auto;margin-right:auto">'
              + esc(p.intro) + '</p>'
            : '')
        + '</div>';

      var cards = (p.cards || []).map(function (c) {
        var paragraphs = (c.paragrafos || []).map(function (par, i) {
          return '<p' + (i === 0 ? ' style="margin-top:16px"' : '') + '>'
               + richtext(par) + '</p>';
        }).join('');
        return ''
          + '<div class="card reveal">'
          +   (c.numero ? '<span class="card-num">' + esc(c.numero) + '</span>' : '')
          +   (c.kicker ? '<h4>' + esc(c.kicker) + '</h4>' : '')
          +   '<h3>' + esc(c.titulo || '') + '</h3>'
          +   paragraphs
          + '</div>';
      }).join('');

      return ''
        + '<section class="' + sectionClass + '" id="como-funciona">'
        +   '<div class="container">'
        +     introHtml
        +     '<div class="grid-2">' + cards + '</div>'
        +   '</div>'
        + '</section>';
    },

    'quote-narrative': function (b) {
      var p = b.props || {};
      var bgClass = p.bg === 'bege'  ? 'section-alt'
                  : p.bg === 'ivory' ? ''
                  : 'section-accent';
      return ''
        + '<section class="' + bgClass + '">'
        +   '<div class="container-narrow">'
        +     '<div class="quote-block reveal">'
        +       '<blockquote>' + esc(p.quote || '') + '</blockquote>'
        +     '</div>'
        +   '</div>'
        + '</section>';
    },

    'benefits-grid': function (b) {
      var p = b.props || {};
      var items = (p.items || []).map(function (it) {
        return ''
          + '<div class="benefit-item">'
          +   (it.icon_svg || '<svg width="22" height="22"></svg>')
          +   '<div>'
          +     '<h4>' + esc(it.titulo || '') + '</h4>'
          +     '<p>' + esc(it.desc || '') + '</p>'
          +   '</div>'
          + '</div>';
      }).join('');
      return ''
        + '<section>'
        +   '<div class="container">'
        +     '<div class="block-intro reveal">'
        +       (p.eyebrow ? '<div class="eyebrow">' + esc(p.eyebrow) + '</div>' : '')
        +       '<h2>' + esc(p.h2 || '') + '</h2>'
        +     '</div>'
        +     '<div class="benefits reveal">' + items + '</div>'
        +   '</div>'
        + '</section>';
    },

    'investimento': function (b) {
      var p = b.props || {};
      var sectionClass = p.bg_section === 'ivory' ? '' : 'section-alt';
      var ctaHtml = '';
      if (p.cta && p.cta.label) {
        ctaHtml = '<div style="margin-top:36px">'
                + '<a href="#" class="btn btn-gold btn-large" '
                + 'data-wa-message="' + esc(p.cta.message_wa || '') + '">'
                + esc(p.cta.label) + '</a></div>';
      }
      return ''
        + '<section class="' + sectionClass + '">'
        +   '<div class="container-narrow">'
        +     '<div class="investimento reveal">'
        +       (p.eyebrow ? '<div class="eyebrow">' + esc(p.eyebrow) + '</div>' : '')
        +       '<h2>' + esc(p.h2 || '') + '</h2>'
        +       (p.valor ? '<div class="investimento-valor">' + esc(p.valor) + '</div>' : '')
        +       (p.sub   ? '<div class="investimento-sub">' + esc(p.sub) + '</div>' : '')
        +       (p.badge_text ? '<div class="cashback-badge">' + esc(p.badge_text) + '</div>' : '')
        +       (p.descricao  ? '<p>' + esc(p.descricao) + '</p>' : '')
        +       ctaHtml
        +     '</div>'
        +   '</div>'
        + '</section>';
    },

    'list-rich': function (b) {
      var p = b.props || {};
      var items = (p.items || []).map(function (it, i, arr) {
        var border = i === arr.length - 1 ? '' : 'border-bottom:1px solid var(--border-soft);';
        return ''
          + '<li class="reveal" style="padding:22px 0;' + border
          + 'display:flex;gap:20px">'
          +   '<span style="flex-shrink:0;width:8px;height:8px;background:var(--champagne);'
          +     'transform:rotate(45deg);margin-top:10px"></span>'
          +   '<div>'
          +     '<h3 style="margin-bottom:6px">' + esc(it.titulo || '') + '</h3>'
          +     '<p style="font-size:15px">' + esc(it.desc || '') + '</p>'
          +   '</div>'
          + '</li>';
      }).join('');
      return ''
        + '<section>'
        +   '<div class="container-narrow">'
        +     '<div class="block-intro reveal">'
        +       (p.eyebrow ? '<div class="eyebrow">' + esc(p.eyebrow) + '</div>' : '')
        +       '<h2>' + esc(p.h2 || '') + '</h2>'
        +     '</div>'
        +     (p.intro ? '<p class="reveal">' + esc(p.intro) + '</p>' : '')
        +     '<ul style="list-style:none;padding:0;margin:40px 0">' + items + '</ul>'
        +   '</div>'
        + '</section>';
    },

    'list-simple': function (b) {
      var p = b.props || {};

    'pricing-table': function (b) {

      var plans = items.map(function (pl) {

              : p.bg === 'dark' ? 'section-dark' : '';
      var variant = (p.variant === 'card') ? 'variant-card' : 'variant-minimal';
      var showDays = p.show_days !== false;
      var timeHtml = (p.variant === 'card')
        ? '<span class="blk-countdown-time"></span>'
        : '<div class="blk-countdown-time">' + (showDays ? '00 ' : '') + '00<span class="blk-countdown-sep">:</span>00<span class="blk-countdown-sep">:</span>00</div>';
      return '<section class="' + sec + '"><div class="container-narrow">'
        + '<div class="blk-countdown ' + variant + '" '
        +   'data-target="' + esc(p.target_at || '') + '" '
        +   'data-show-days="' + (showDays ? '1' : '0') + '" '
        +   'data-variant="' + (p.variant || 'minimal') + '">'
        +   (p.label ? '<div class="blk-countdown-label">' + esc(p.label) + '</div>' : '')
        +   timeHtml
        +   '<div class="blk-countdown-expired" style="display:none">' + esc(p.show_after_zero || 'Encerrado') + '</div>'
        + '</div>'
        + '</div></section>';
    },

    'timeline-scrub': function (b) {
      var p = b.props || {};
      var sec = p.bg === 'bege' ? 'section-alt'
              : p.bg === 'dark' ? 'section-dark' : '';
      var items = (p.items || []).filter(function (it) { return it && it.foto_url; });
      var imgs = items.map(function (it, i) {
        return '<img class="blk-tscrub-img' + (i === 0 ? ' is-active' : '') + '" '
          + 'src="' + esc(it.foto_url) + '" alt="' + esc(it.label || '') + '" '
          + 'data-label="'   + esc(it.label || '') + '" '
          + 'data-legenda="' + esc(it.legenda || '') + '" loading="lazy">';
      }).join('');
      var dots = items.map(function (it, i) {
        return '<button class="blk-tscrub-dot' + (i === 0 ? ' is-active' : '') + '" type="button" data-idx="' + i + '">'
          + '<span class="blk-tscrub-dot-label">' + esc(it.label || '') + '</span>'
          + '</button>';
      }).join('');
      var firstLabel   = (items[0] && items[0].label)   || '';
      var firstLegenda = (items[0] && items[0].legenda) || '';
      return '<section class="' + sec + '"><div class="container">'
        + ((p.eyebrow || p.h2 || p.intro)
            ? '<div class="block-intro reveal">'
              + (p.eyebrow ? '<div class="eyebrow">' + esc(p.eyebrow) + '</div>' : '')
              + (p.h2      ? '<h2>' + esc(p.h2) + '</h2>' : '')
              + (p.intro   ? '<p style="margin-top:18px;max-width:640px;margin-left:auto;margin-right:auto">' + esc(p.intro) + '</p>' : '')
              + '</div>'
            : '')
        + '<div class="blk-tscrub reveal" data-autoplay="' + (p.autoplay ? '1' : '0') + '">'
        +   '<div class="blk-tscrub-stage">'
        +     '<div class="blk-tscrub-overlay">' + esc(firstLabel) + '</div>'
        +     imgs
        +   '</div>'
        +   '<div class="blk-tscrub-track">' + dots + '</div>'
        +   '<div class="blk-tscrub-caption">' + esc(firstLegenda) + '</div>'
        + '</div>'
        + '</div></section>';
    },
  };

  // ────────────────────────────────────────────────────────────
  // Render flow
  // ────────────────────────────────────────────────────────────
  function renderError(msg) {
    if (window.LPBPageTransition) { try { LPBPageTransition.hideSplash(); } catch (e) {} }
    document.getElementById('lpRoot').innerHTML = ''
      + '<div class="lp-error">'
      +   '<h2>Pagina nao encontrada</h2>'
      +   '<p>' + esc(msg || 'O link pode ter expirado ou estar incorreto.') + '</p>'
      + '</div>';
  }

  function renderPage(data) {
    document.title = data.title || 'Clinica Mirian de Paula';
    if (data.meta_description) {
      var m = document.querySelector('meta[name="description"]');
      if (!m) {
        m = document.createElement('meta');
        m.name = 'description';
        document.head.appendChild(m);
      }
      m.content = data.meta_description;
    }
    if (data.og_image_url) {
      var og = document.createElement('meta');
      og.setAttribute('property', 'og:image');
      og.content = data.og_image_url;
      document.head.appendChild(og);
    }

    applyTokensOverride(data.tokens_override || {});
    injectTracking(data.tracking || {});
    if (window.LPBSeoSchema) {
      try { LPBSeoSchema.applyToPage(data, document); }
      catch (e) { console.warn('[lp] schema.org inject falhou:', e); }
    }

    var blocks = Array.isArray(data.blocks) ? data.blocks : [];
    // Aplica i18n se LPBI18n disponível
    var lang = (window.LPBI18n && LPBI18n.detectLang && LPBI18n.detectLang()) || 'pt-BR';
    var resolvedBlocks = (window.LPBI18n && LPBI18n.applyI18nAll)
      ? LPBI18n.applyI18nAll(blocks, lang)
      : blocks;
    document.documentElement.lang = lang;

    var html = resolvedBlocks.map(function (b, idx) {
      var fn = Blocks[b && b.type];
      var inner = fn ? fn(b) : '';
      if (!inner) return '';
      var animType = (b._style && b._style.animation && b._style.animation.type) || '';
      var animAttr = (animType && animType !== 'none')
        ? ' class="lpb-anim-' + esc(animType) + '" data-reveal-anim'
        : '';
      // id="bloco-N" pra anchor links (magazine-toc + futuro)
      return '<div id="bloco-' + idx + '" data-block-idx="' + idx + '" data-block-type="' + esc(b.type) + '"' + animAttr + '>' + inner + '</div>';
    }).join('');

    var root = document.getElementById('lpRoot');
    root.innerHTML = html;
    document.body.dataset.landing = data.slug || 'lp';

    // ── Performance: lazy + decoding async em todas <img>, exceto a 1ª (LCP)
    var allImgs = root.querySelectorAll('img');
    allImgs.forEach(function (img, i) {
      if (i === 0) {
        img.setAttribute('fetchpriority', 'high');
        img.setAttribute('decoding', 'async');
      } else {
        if (!img.hasAttribute('loading'))  img.setAttribute('loading', 'lazy');
        if (!img.hasAttribute('decoding')) img.setAttribute('decoding', 'async');
      }
    });
    // ── Iframes (vídeo etc.) também lazy
    root.querySelectorAll('iframe').forEach(function (f) {
      if (!f.hasAttribute('loading')) f.setAttribute('loading', 'lazy');
    });

    // Injeta CSS dos ajustes por bloco
    if (window.LPBBlockStyle) {
      var styleEl = document.getElementById('lp-block-styles');
      if (styleEl) styleEl.textContent = window.LPBBlockStyle.generateAllCss(blocks);
    }

    // Init de blocos interativos (before-after slider, etc.)
    if (window.LPBlocks) window.LPBlocks.init(document);

    // Onda 29: bind do anatomy-quiz runtime (interatividade dos hotspots + form)
    if (window.LPBAnatomyQuizRuntime) {
      try { LPBAnatomyQuizRuntime.bind(document.getElementById('lpRoot')); } catch(e) {}
    }
    // Onda 29 · final: smart-popup, transformation-reel, smart-cta runtimes
    if (window.LPBSmartPopupRuntime) try { LPBSmartPopupRuntime.bind(document.getElementById('lpRoot')); } catch(e) {}
    if (window.LPBReelRuntime)        try { LPBReelRuntime.bind(document.getElementById('lpRoot'));        } catch(e) {}
    if (window.LPBSmartCTARuntime)    try { LPBSmartCTARuntime.bind(document.getElementById('lpRoot'));    } catch(e) {}

    // Onda 29: runtimes de blocos engajamento (collagen + live-counter)
    if (window.LPBCollagenRuntime) try { LPBCollagenRuntime.bind(document.getElementById('lpRoot')); } catch(e) {}
    if (window.LPBLiveCounterRuntime) try { LPBLiveCounterRuntime.bind(document.getElementById('lpRoot')); } catch(e) {}

    // Onda 28: BA-carousel autoplay + dots tap
    if (window.LPBBlockBaCarousel && window.LPBBlockBaCarousel.bind) {
      try { LPBBlockBaCarousel.bind(document.getElementById('lpRoot')); } catch(e) {}
    }
    // Onda 30: BA-reveal slider drag handle
    if (window.LPBBaRevealRuntime && window.LPBBaRevealRuntime.bind) {
      try { LPBBaRevealRuntime.bind(document.getElementById('lpRoot')); } catch(e) {}
    }

    // Re-wire WhatsApp links + reveal (lp-shared.js boot ja rodou antes do conteudo dinamico)
    if (window.LPShared) {
      window.LPShared.wireWhatsAppLinks();
      // reveal: roda novamente pra elementos novos
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) {
              e.target.classList.add('is-visible');
              observer.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('.reveal:not(.is-visible)').forEach(function (el) {
          observer.observe(el);
        });
      }
    }
  }

  function trackConversionOnCTAClick(slug) {
    document.body.addEventListener('click', function (ev) {
      var a = ev.target.closest && ev.target.closest('[data-wa-message]');
      if (!a) return;
      // fire-and-forget
      rpc('lp_page_track_conversion', { p_slug: slug }).catch(function () {});
    }, true);
  }

  // Smooth scroll pra anchor links internos (magazine-toc + futuros)
  document.body.addEventListener('click', function (ev) {
    var a = ev.target.closest && ev.target.closest('[data-toc-target]');
    if (!a) return;
    var target = a.getAttribute('data-toc-target');
    if (!target) return;
    var el = document.getElementById(target);
    if (!el) return;
    ev.preventDefault();
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Atualiza URL com hash sem causar re-scroll brusco
    if (history && history.replaceState) {
      history.replaceState(null, '', '#' + target);
    }
  });

  // ────────────────────────────────────────────────────────────
  // Boot
  // ────────────────────────────────────────────────────────────
  function boot() {
    var slug = new URLSearchParams(window.location.search).get('s');
    if (!slug) { renderError('Parametro "s" ausente na URL.'); return; }

    // Onda 28: splash editorial (estilo revista) — aparece imediatamente
    if (window.LPBPageTransition) {
      try { LPBPageTransition.showSplash(); } catch (e) {}
    }

    var bootStart = performance.now();
    var MIN_SPLASH_MS = 900;  // garante que splash aparece pelo menos esse tempo (caso resolve seja muito rápido)

    rpc('lp_page_resolve', { p_slug: slug })
      .then(function (data) {
        if (!data || data.ok === false) {
          if (window.LPBPageTransition) LPBPageTransition.hideSplash();
          renderError(data && data.reason === 'not_found'
            ? 'Esta pagina ainda nao foi publicada.'
            : 'Erro ao carregar a pagina.');
          return;
        }
        // A/B split: pode redirecionar antes de renderizar
        if (maybeRedirectAbVariant(data)) return;
        renderPage(data);

        // Onda 28: aplica entrada animada nos blocos + esconde splash (com min duration)
        var lpRoot = document.getElementById('lpRoot');
        if (window.LPBPageTransition && lpRoot) {
          var elapsed = performance.now() - bootStart;
          var wait = Math.max(0, MIN_SPLASH_MS - elapsed);
          setTimeout(function () {
            try {
              LPBPageTransition.enterContent(lpRoot);
              LPBPageTransition.hideSplash();
            } catch (e) {}
          }, wait);
        }
        // Banner LGPD (se config.enabled)
        if (window.LPBLgpdBanner) {
          try { LPBLgpdBanner.maybeShow(data, rpc); }
          catch (e) { console.warn('[lp] lgpd banner falhou:', e); }
        }
        // Onda 24: jornada cross-LP
        var lgpdEnabled = !!(data.lgpd_config && data.lgpd_config.enabled);
        if (window.LPBJourneyTracker) {
          try { LPBJourneyTracker.boot(slug, rpc, lgpdEnabled); }
          catch (e) { console.warn('[lp] journey falhou:', e); }
        }
        // Onda 25: heatmap (sampling 1/3)
        if (window.LPBHeatmapTracker) {
          try { LPBHeatmapTracker.boot(slug, rpc, lgpdEnabled); }
          catch (e) { console.warn('[lp] heatmap falhou:', e); }
        }
        // Onda 29: engagement engine (smart-popup, reel, smart-cta, etc.)
        if (window.LPBEngagement && LPBEngagement.boot) {
          try { LPBEngagement.boot({ slug: slug, rpc: rpc, lgpdEnabled: lgpdEnabled }); }
          catch (e) { console.warn('[lp] engagement boot falhou:', e); }
        }
        // Track view com tag AB se aplicável
        var abTag = (new URLSearchParams(window.location.search)).get('ab') || '';
        rpc('lp_page_track_view', { p_slug: slug }).catch(function () {});
        trackConversionOnCTAClick(slug);
      })
      .catch(function (err) {
        console.error('[LP] resolve error:', err);
        renderError('Falha de conexao. Tente novamente.');
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
